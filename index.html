        ${editing ? `<button class="btn btn-ghost" onclick="deleteBankEntry('${editing.id}')">削除</button>` : ''}
        <button class="btn btn-primary" onclick="submitBankForm(${editing? `'${editing.id}'`:'null'})">${editing?'更新する':'登録する'}</button>
      </div>
    `;
  }

  window._bankFormState = state;
  window.bankFormSetType = (t)=>{ state.transactionType = t; openModal(body()); captureBankFormInputs(); };

  function captureBankFormInputs(){
    const dateEl = document.getElementById('bf_date');
    const acctEl = document.getElementById('bf_account');
    const amtEl = document.getElementById('bf_amount');
    const descEl = document.getElementById('bf_description');
    const memoEl = document.getElementById('bf_memo');
    if(dateEl) dateEl.oninput = ()=>state.date = dateEl.value;
    if(acctEl) acctEl.oninput = ()=>state.accountId = acctEl.value;
    if(amtEl) amtEl.oninput = ()=>state.amount = amtEl.value;
    if(descEl) descEl.oninput = ()=>state.description = descEl.value;
    if(memoEl) memoEl.oninput = ()=>state.memo = memoEl.value;
  }

  openModal(body());
  captureBankFormInputs();
}

function submitBankForm(editId){
  const s = window._bankFormState;
  if(!s.date){ showToast('登録日を入力してください'); return; }
  if(!s.accountId){ showToast('口座を選択してください'); return; }
  if(!s.amount || Number(s.amount)<=0){ showToast('金額を入力してください'); return; }

  const prevEntry = editId ? DB.bankEntries.find(e=>e.id===editId) : null;

  // B-03対応：以前に口座残高へ反映済みだった分のみ取り消す。保留中（未来日）
  // のまま編集された場合はそもそも反映されていないため取り消し不要。
  if(prevEntry && prevEntry.appliedToBalance){
    reverseBankEntryEffect(prevEntry);
  }

  // 新しい内容は、日付が本日以前の場合のみ今すぐ口座残高へ反映する。
  // 未来日の場合は反映を保留し（appliedToBalance=false）、12か月予測側でのみ
  // 計上する。保留分は日付が到来した時点でアプリ起動時のキャッチアップにより
  // 自動的に反映される（runDueBankEntriesCatchUp）。
  const willApplyNow = !isFutureDate(s.date);
  if(willApplyNow){
    applyBankEntryEffect({ accountId:s.accountId, transactionType:s.transactionType, amount:Number(s.amount) });
  }

  if(editId){
    touchRecord(Object.assign(prevEntry, {
      date:s.date, accountId:s.accountId, transactionType:s.transactionType,
      amount:Number(s.amount), description:s.description, memo:s.memo,
      appliedToBalance: willApplyNow,
    }));
    showToast('入出金を更新しました');
  }else{
    DB.bankEntries.push(stampNew({
      id: uid('be'), date:s.date, accountId:s.accountId, transactionType:s.transactionType,
      amount:Number(s.amount), description:s.description, memo:s.memo,
      appliedToBalance: willApplyNow,
    }));
    showToast('入出金を登録しました');
  }
  saveData();
  closeModal();
  renderHome(); renderSettings(); renderSummary();
}

function deleteBankEntry(id){
  // B-03対応：保留中（appliedToBalance:false）の明細は削除しても口座残高は
  // 変化しないため、その旨が伝わる文言に出し分ける。
  const target = DB.bankEntries.find(e=>e.id===id);
  const isPending = target && target.appliedToBalance === false;
  const confirmMsg = isPending
    ? 'この予定（未反映）の入出金を削除しますか？口座残高はまだ反映されていないため変化しません。'
    : 'この入出金を削除しますか？口座残高も元に戻ります。';
  askConfirm(confirmMsg, ()=>{
    const entry = DB.bankEntries.find(e=>e.id===id);
    // 反映済み（appliedToBalance:true）の場合のみ口座残高を戻す。
    // 保留中（未来日でまだ反映されていない）の明細はそもそも残高に影響して
    // いないため、削除しても残高は変化しない。
    if(entry && entry.appliedToBalance){
      reverseBankEntryEffect(entry);
    }
    DB.bankEntries = DB.bankEntries.filter(e=>e.id!==id);
    saveData();
    closeModal();
    renderHome(); renderSettings(); renderSummary();
  });
}

  DB.creditEntries.push(stampNew({

// 4-4 入出金を複製（日付を今日にリセット・残高は反映しない）
function duplicateBankEntry(id){
  const src = DB.bankEntries.find(e=>e.id===id);
  if(!src) return;
  // 複製は常に本日日付になるため（date: todayISO()）、新方式でも必ず

  const newEntry = stampNew({ ...src, id: uid('be'), date: todayISO(), appliedToBalance: true });

      </div>
      ${editing ? `
      <div class="field">
        <label>状態</label>
        <div class="segmented">
          <button type="button" class="${state.active?'active':''}" onclick="largeFormSetActive(true)">有効</button>
          <button type="button" class="${!state.active?'active':''}" onclick="largeFormSetActive(false)">停止</button>
        </div>
      </div>` : ''}
      <div class="form-actions">
        ${editing ? `<button class="btn btn-ghost" onclick="deleteLargeExpense('${editing.id}')">削除</button>` : ''}
        <button class="btn btn-primary" onclick="submitLargeForm(${editing? `'${editing.id}'`:'null'})">${editing?'更新する':'登録する'}</button>
      </div>
    `;
  }

  window._largeFormState = state;
  window.largeFormSetTxnType = (t)=>{ state.transactionType=t; openModal(body()); captureLargeFormInputs(); };
  window.largeFormSetFreq = (k)=>{
    state.frequency=k;
    if(k!=='custom'){ state.amountMode='uniform'; }
    if(k==='spot'){ state.endDate=''; } // スポットは終了日を使わないためクリア
    openModal(body()); captureLargeFormInputs();
  };
  window.largeFormToggleMonth = (m)=>{
    const idx = state.customMonths.indexOf(m);
    if(idx>=0) state.customMonths.splice(idx,1); else state.customMonths.push(m);
    openModal(body()); captureLargeFormInputs();
  };
  window.largeFormSetAmountMode = (mode)=>{ state.amountMode=mode; openModal(body()); captureLargeFormInputs(); };
  window.largeFormSetType = (t)=>{ state.type=t; state.mainCategory=''; state.subCategory=''; openModal(body()); captureLargeFormInputs(); };
  window.largeFormSetMainCat = (n)=>{ state.mainCategory=n; state.subCategory=''; openModal(body()); captureLargeFormInputs(); };
  window.largeFormSetSubCat = (n)=>{ state.subCategory=n; openModal(body()); captureLargeFormInputs(); };
  window.largeFormSetActive = (v)=>{ state.active=v; openModal(body()); captureLargeFormInputs(); };

  function captureLargeFormInputs(){
    const nameEl = document.getElementById('lf_name');
    const amtEl = document.getElementById('lf_amount');
    const dateEl = document.getElementById('lf_startDate');
    const endDateEl = document.getElementById('lf_endDate');
    const acctEl = document.getElementById('lf_account');
    const memoEl = document.getElementById('lf_memo');
    if(nameEl) nameEl.oninput = ()=>state.name = nameEl.value;
    if(amtEl) amtEl.oninput = ()=>state.amount = amtEl.value;
    if(dateEl) dateEl.oninput = ()=>state.startDate = dateEl.value;
    if(endDateEl) endDateEl.oninput = ()=>state.endDate = endDateEl.value;
    if(acctEl) acctEl.oninput = ()=>state.accountId = acctEl.value;
    if(memoEl) memoEl.oninput = ()=>state.memo = memoEl.value;
    (state.customMonths||[]).forEach(m=>{
      const el = document.getElementById('lf_monthAmt_'+m);
      if(el) el.oninput = ()=>{ state.monthlyAmounts[m] = el.value; };
    });
  }

  openModal(body());
  captureLargeFormInputs();
}

function submitLargeForm(editId){
  const s = window._largeFormState;
  if(!s.name || !s.name.trim()){ showToast('名称を入力してください'); return; }
  if(!s.startDate){ showToast('開始日を入力してください'); return; }
  if(s.endDate && s.endDate < s.startDate){ showToast('終了日は開始日以降にしてください'); return; }
  if(!s.mainCategory){ showToast('大カテゴリを選択してください'); return; }
  if(!s.subCategory){ showToast('中カテゴリを選択してください'); return; }
  if(!s.accountId){ showToast('口座を選択してください'); return; }
  if(s.frequency==='custom' && (!s.customMonths || s.customMonths.length===0)){ showToast('対象月を選択してください'); return; }

  let amount = 0;
  let monthlyAmounts = {};
  const usePerMonth = s.frequency==='custom' && s.amountMode==='perMonth';
  if(usePerMonth){
    for(const m of s.customMonths){
      const v = Number(s.monthlyAmounts[m]);
      if(!v || v<=0){ showToast(`${m}月の金額を入力してください`); return; }
      monthlyAmounts[m] = v;
    }
  }else{
    if(!s.amount || Number(s.amount)<=0){ showToast('金額を入力してください'); return; }
    amount = Number(s.amount);
  }

  const payload = {
    name:s.name.trim(), transactionType:s.transactionType, amount, startDate:s.startDate, endDate:s.endDate||'',
    frequency:s.frequency, customMonths: s.frequency==='custom' ? s.customMonths.slice() : [],
    amountMode: usePerMonth ? 'perMonth' : 'uniform', monthlyAmounts,
    type:s.type, mainCategory:s.mainCategory, subCategory:s.subCategory,
    accountId:s.accountId, memo:s.memo,
  };

  if(editId){
    const exp = DB.largeExpenses.find(e=>e.id===editId);
    touchRecord(Object.assign(exp, payload, { active: s.active }));
  }else{
    DB.largeExpenses.push(stampNew(Object.assign({id: uid('le')}, payload, {active:true})));
  }
  const ok = saveData();
  closeModal();
  renderLarge(); renderHome(); renderSummary();
  if(!ok){
    showToast('定期入出金の更新に失敗しました(保存エラー)');
  } else {
    showToast(editId ? '定期入出金を更新しました' : '定期入出金を登録しました');
  }
}

function deleteLargeExpense(id){
  askConfirm('この定期入出金を削除しますか？', ()=>{
    DB.largeExpenses = DB.largeExpenses.filter(e=>e.id!==id);
    saveData();
    closeModal();
    renderLarge(); renderHome(); renderSummary();
  });
}

/* ---- フィルタ付き集計ヘルパー ---- */
// summaryTypeFilter に応じてクレカ明細・定期入出金を絞り込む
function filteredCreditEntries(entries){ return summaryTypeFilter==='all' ? entries : entries.filter(e=>e.type===summaryTypeFilter); }
function filteredLargeExpenses(expenses){ return summaryTypeFilter==='all' ? expenses : expenses.filter(e=>e.type===summaryTypeFilter); }

// フィルタ付き月次クレカ利用合計
function creditTotalForMonthF(mk){ return filteredCreditEntries(creditEntriesForMonth(mk)).reduce((s,e)=>s+Number(e.amount||0),0); }
// フィルタ付き引落合計（引落月ベース）
function creditSettlementTotalForMonthF(mk){ return filteredCreditEntries(DB.creditEntries).filter(e=>entrySettlementMonthKey(e)===mk).reduce((s,e)=>s+Number(e.amount||0),0); }
// フィルタ付き定期支出合計
function recurringExpenseTotalForMonthF(mk){ return filteredLargeExpenses(largeExpensesForMonth(mk)).filter(e=>(e.transactionType||'withdraw')==='withdraw').reduce((s,e)=>s+amountForExpenseInMonth(e,mk),0); }
// フィルタ付き定期収入合計
function recurringIncomeTotalForMonthF(mk){ return filteredLargeExpenses(largeExpensesForMonth(mk)).filter(e=>(e.transactionType||'withdraw')==='deposit').reduce((s,e)=>s+amountForExpenseInMonth(e,mk),0); }
// フィルタ付きカテゴリ別支出（円グラフ・内訳テーブル用）
function categoryBreakdownForMonthF(mk){
  const map = {};
  filteredCreditEntries(creditEntriesForMonth(mk)).forEach(e=>{ map[e.mainCategory]=(map[e.mainCategory]||0)+Number(e.amount||0); });
  filteredLargeExpenses(largeExpensesForMonth(mk)).filter(e=>(e.transactionType||'withdraw')==='withdraw').forEach(e=>{ map[e.mainCategory]=(map[e.mainCategory]||0)+amountForExpenseInMonth(e,mk); });
  return Object.entries(map).map(([name,amount])=>({name,amount})).sort((a,b)=>b.amount-a.amount);
}

/* =========================================================================
   今月の利用内訳（I-01対応：線形外挿予測を廃止し実績ベースに置き換え）
   -------------------------------------------------------------------------
   利用日ベースの実績を「上位3件の占有率」で説明する。
   予測・前月比は出さない。データが少ない月初でも誤解を招かない設計。
   ========================================================================= */
function renderCreditUsageBreakdown(){
  const el = document.getElementById('creditUsageBreakdown');
  if(!el) return;

  const mk = summaryMonth;
  const [, tm] = mk.split('-').map(Number);

  // フィルタ適用済みの当月明細（利用日ベース）
  const entries = filteredCreditEntries(creditEntriesForMonth(mk));
  const count   = entries.length;
  const total   = entries.reduce((s,e)=>s+Number(e.amount||0), 0);

  // データなし
  if(count === 0){
    el.innerHTML = `<div class="empty-state">
      <div class="et">${tm}月のカード利用がありません</div>
      <div class="es">ホームタブからカード明細を登録すると、ここに内訳が表示されます</div>
    </div>`;
    return;
  }

  // 金額降順ソートして上位3件を取得
  const sorted   = entries.slice().sort((a,b)=>Number(b.amount||0)-Number(a.amount||0));
  const top3     = sorted.slice(0, 3);
  const top3sum  = top3.reduce((s,e)=>s+Number(e.amount||0), 0);
  const top3pct  = total > 0 ? top3sum / total : 0;
  const restCount  = Math.max(0, count - 3);
  const restAmount = total - top3sum;

  // ===== キャプション（しきい値・文言） =====
  // count===1 は100%が当然なので偏り警告は出さず専用文言を使う
  let captionTone, captionText;
  if(count === 1){
    captionTone = 'muted';
    captionText = `今月の実績はまだこの1件のみです。傾向として読むにはデータが足りません。`;
  } else if(top3pct >= 0.70){
    // 上位1件が支配的かどうかで文言を分ける
    const top1pct = total > 0 ? Number(top3[0].amount||0) / total : 0;
    const top1cat = top3[0].mainCategory || '';
    captionTone = 'coral';
    captionText = top1pct >= 0.60
      ? `今月の利用額の大部分は「${top1cat}」の1件によるものです。日常の利用ペースは、これを除いて見るとよさそうです。`
      : `上位3件の支出が今月の大半を占めています。`;
  } else if(top3pct >= 0.40){
    captionTone = 'gold';
    captionText = `上位3件がやや大きいものの、極端な偏りではありません。残りは複数の支出に分かれています。`;
  } else {
    captionTone = 'green';
    captionText = `特定の支出に偏らず、日々の利用が積み重なった金額です。`;
  }

  // トーン別スタイル
  const toneStyle = {
    muted: 'background:#F1F0EC; color:var(--ink-soft);',
    coral: 'background:var(--coral-tint); color:var(--ink);',
    gold:  'background:var(--gold-tint); color:var(--ink);',
    green: 'background:var(--green-tint); color:var(--ink);',
  };

  // バーの色：偏りが強いほどcoral、分散しているほどteal
  const barColor = top3pct >= 0.70 ? 'var(--coral)'
    : top3pct >= 0.40 ? 'var(--gold)'
    : 'var(--teal-deep)';

  // 上位3件のHTML（件数が3件未満のときは実件数だけ表示）
  const top3rows = top3.map((e, i)=>{
    const card = findCard(e.cardId);
    return `
      <div style="display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--line);">
        <span style="width:14px; font-size:11px; font-weight:700; color:var(--ink-soft); flex-shrink:0; text-align:center;">${i+1}</span>
        <span style="width:30px; font-size:12px; color:var(--ink-soft); flex-shrink:0;" class="num">${fmtDateShort(e.date)}</span>
        <span style="flex:1; font-size:13.5px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(e.mainCategory)}${e.subCategory?' / '+escapeHtml(e.subCategory):''}</span>
        <span style="font-size:14px; font-weight:700; color:var(--ink); flex-shrink:0;" class="num">${yen(e.amount)}</span>
      </div>`;
  }).join('');

  // 「ほかN件」行（4件目以降がある場合のみ）
  const restRow = restCount > 0
    ? `<div style="font-size:12px; color:var(--ink-soft); padding:8px 0 2px 22px;">ほか${restCount}件　計 <span class="num">${yen(restAmount)}</span></div>`
    : '';

  // バー幅：top3pctを使う。0件の場合のゼロ除算はcount===0で先にガード済み
  const barWidth = Math.round(top3pct * 100);

  el.innerHTML = `
    <!-- ヘッダー：利用額と件数 -->
    <div style="margin-bottom:14px;">
      <div style="font-size:11px; font-weight:700; color:var(--ink-soft); margin-bottom:3px;">
        ${tm}月の利用額
      </div>
      <div style="display:flex; align-items:baseline; gap:6px;">
        <span class="num" style="font-size:26px; font-weight:700; color:var(--ink); line-height:1;">${yen(total)}</span>
        <span style="font-size:14px; font-weight:600; color:var(--ink-soft);">（${count}件）</span>
      </div>
    </div>

    <div style="height:1px; background:var(--line); margin-bottom:12px;"></div>

    <!-- 上位の利用 -->
    <div style="font-size:11px; font-weight:700; color:var(--ink-soft); margin-bottom:2px;">上位の利用</div>
    ${top3rows}
    ${restRow}

    <!-- 上位3件の占有率バー -->
    <div style="margin-top:14px;">
      <div style="height:10px; border-radius:99px; overflow:hidden; background:var(--line);">
        <div style="height:100%; width:${barWidth}%; background:${barColor}; border-radius:99px; transition:width .4s ease;"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:7px; font-size:11px; color:var(--ink-soft);">
        <span>上位${Math.min(count,3)}件の合計</span>
        <b class="num" style="color:${barColor};">全体の ${barWidth}%</b>
      </div>
    </div>

    <!-- キャプション -->
    <div style="${toneStyle[captionTone]} padding:10px 12px; border-radius:10px; margin-top:12px; font-size:12px; line-height:1.65;">
      ${escapeHtml(captionText)}
    </div>
  `;
}

/* =========================================================================
   6-1  月次サマリ
   クレカ利用額・クレカ引落額・定期支出・定期収入・入出金差額・月末予測残高
   の6項目を選択月単位で表示する。
   ========================================================================= */
function renderMonthlySummaryCard(){
  const el = document.getElementById('monthlySummaryCard');
  if(!el) return;
  const mk = summaryMonth;

  const creditUsage    = creditTotalForMonthF(mk);              // クレカ利用額（利用日ベース）
  const creditSettled  = creditSettlementTotalForMonthF(mk);    // クレカ引落額（引落月ベース）
  const recurExpense   = recurringExpenseTotalForMonthF(mk);    // 定期支出
  const recurIncome    = recurringIncomeTotalForMonthF(mk);     // 定期収入

  // 入出金差額：bankEntriesの入金合計 - 出金合計（bankEntriesはtype区分なしのためフィルタ対象外）
  let bankIn = 0, bankOut = 0;
  bankEntriesForMonth(mk).forEach(e=>{
    if(e.transactionType==='deposit') bankIn += Number(e.amount||0);
    else bankOut += Number(e.amount||0);
  });
  const bankDiff = bankIn - bankOut;

  // 月末予測残高：現在残高 から 当月末までの累積変動を計算
  const today = new Date();
  const baseMk = monthKey(today);
  let forecast = totalBalance();
  const [sy, sm] = mk.split('-').map(Number);
  const [by, bm] = baseMk.split('-').map(Number);
  const monthDiff = (sy - by) * 12 + (sm - bm);
  // 月末予測残高：通常入出金（bankEntries）のうち date<=本日 のものは登録時点で
  // totalBalance() に反映済み。未来日分（appliedToBalance=false）は保留されて
  // totalBalance() に含まれていないため、ここでは futureBankNetForMonth(imk)
  // で保留分のみを月ごとに積み上げる（pendingBankEntries()がappliedToBalance:
  // falseのみを対象にしているため、反映済み分との二重計算にはならない）。
  if(monthDiff >= 0){
    for(let i = 0; i <= monthDiff; i++){
      const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
      const imk = monthKey(d);
      forecast += recurringIncomeTotalForMonthF(imk)
               - recurringExpenseTotalForMonthF(imk)
               - creditSettlementTotalForMonthF(imk)
               + futureBankNetForMonth(imk);
    }
  } else {
    for(let i = 0; i >= monthDiff; i--){
      const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
      const imk = monthKey(d);
      forecast -= recurringIncomeTotalForMonthF(imk)
               - recurringExpenseTotalForMonthF(imk)
               - creditSettlementTotalForMonthF(imk)
               + futureBankNetForMonth(imk);
    }
  }

  // 6項目の定義
  const items = [
    { label:'クレカ利用額',   value: creditUsage,   color:'var(--coral)',    sign:-1, note:'利用日ベース' },
    { label:'クレカ引落額',   value: creditSettled, color:'var(--coral)',    sign:-1, note:'引落月ベース' },
    { label:'定期支出',       value: recurExpense,  color:'var(--coral)',    sign:-1, note:'' },
    { label:'定期収入',       value: recurIncome,   color:'var(--green)',    sign:+1, note:'' },
    { label:'入出金差額',     value: bankDiff,      color: bankDiff>=0?'var(--green)':'var(--coral)', sign:0, note: summaryTypeFilter==='all' ? '入金－出金' : '入金－出金（フィルタ対象外）' },
    { label:'月末予測残高',   value: forecast,      color: forecast>=0?'var(--teal-deep)':'var(--coral)', sign:0, note: summaryTypeFilter==='all'?'定期・引落反映後':`${summaryTypeFilter==='personal'?'個人':'家計'}分のみ反映（口座残高は全体共通）`, large:true },
  ];

  el.innerHTML = `
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); border-radius:10px; overflow:hidden;">
      ${items.map((item, i)=>{
        const isLarge = !!item.large;
        const displayVal = item.sign === 1 ? (item.value>0 ? '+'+yen(item.value) : yen(0))
                         : item.sign === -1 ? (item.value>0 ? '-'+yen(item.value) : yen(0))
                         : (item.value > 0 ? '+' : '') + yen(item.value);
        return `
          <div style="background:var(--paper-raised); padding:13px 14px; ${isLarge?'grid-column:1/-1; border-top:1px solid var(--line);':''}">
            <div style="font-size:11px; color:var(--ink-soft); font-weight:600; margin-bottom:4px;">
              ${escapeHtml(item.label)}
              ${item.note ? `<span style="font-weight:400; opacity:0.8;">（${escapeHtml(item.note)}）</span>` : ''}
            </div>
            <div class="num" style="font-size:${isLarge?'22px':'17px'}; font-weight:700; color:${item.color}; line-height:1.1;">
              ${item.value===0 && item.sign!==0 ? '<span style="color:var(--ink-soft);">—</span>' : escapeHtml(displayVal)}
            </div>
          </div>`;
      }).join('')}
    </div>
    ${summaryTypeFilter!=='all' ? `
    <div class="helper-text" style="margin-top:10px; margin-bottom:0;">
      ⚠️ <strong>${summaryTypeFilter==='personal'?'個人':'家計'}</strong>フィルタ中：口座残高（現在残高）は全体共通のため、フィルタの影響を受けません。クレカ・定期支出など差し引き対象のみ絞り込んでいます。
    </div>` : ''}
  `;
}

function shiftSummaryMonth(delta){
  const [y,m] = summaryMonth.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  summaryMonth = monthKey(d);
  renderSummary();
}

function categoryBreakdownForMonth(mk){
  return categoryBreakdownForMonthF(mk);
}

function renderPie(){
  const el = document.getElementById('pieWrap');
  const data = categoryBreakdownForMonth(summaryMonth);
  const total = data.reduce((s,d)=>s+d.amount,0);

  if(total===0){
    el.innerHTML = `<div class="empty-state">
      <div class="et">この月の支出データがありません</div>
      <div class="es">カード明細や定期入出金を登録すると、ここに円グラフが表示されます</div>
    </div>`;
    return;
  }

  let cumulative = 0;
  const r = 55, cx=60, cy=60;
  const paths = data.map((d,i)=>{
    const startAngle = (cumulative/total) * 2*Math.PI - Math.PI/2;
    cumulative += d.amount;
    const endAngle = (cumulative/total) * 2*Math.PI - Math.PI/2;
    const x1 = cx + r*Math.cos(startAngle), y1 = cy + r*Math.sin(startAngle);
    const x2 = cx + r*Math.cos(endAngle), y2 = cy + r*Math.sin(endAngle);
    const largeArc = (endAngle-startAngle) > Math.PI ? 1 : 0;
    const color = PIE_COLORS[i % PIE_COLORS.length];
    if(data.length===1){
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/>`;
    }
    return `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${largeArc} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${color}"/>`;
  }).join('');

  const svg = `<svg width="120" height="120" viewBox="0 0 120 120">${paths}<circle cx="${cx}" cy="${cy}" r="28" fill="var(--paper-raised)"/></svg>`;

  const legend = data.map((d,i)=>`
    <div class="legend-row">
      <span class="legend-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></span>
      <span class="legend-name">${escapeHtml(d.name)}</span>
      <span class="legend-val num">${yen(d.amount)}</span>
    </div>
  `).join('');

  el.innerHTML = `<div class="pie-wrap">
    <div style="position:relative; flex-shrink:0;">
      ${svg}
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;">
        <div style="font-size:9px; color:var(--ink-soft);">合計</div>
        <div style="font-size:11px; font-weight:700;" class="num">${yen(total)}</div>
      </div>
    </div>
    <div class="pie-legend">${legend}</div>
  </div>`;
}

function renderAnnualTable(){

  const thisMk = monthKey(new Date());
  let rows = [];
  let sums = {usage:0, settlement:0, recurExpense:0, recurIncome:0, totalExpense:0, netFlow:0};

  for(let m=1; m<=12; m++){
    const mk = `${year}-${String(m).padStart(2,'0')}`;
    const usage       = creditTotalForMonthF(mk);
    const settlement  = creditSettlementTotalForMonthF(mk);
    const recurExpense= recurringExpenseTotalForMonthF(mk);
    const recurIncome = recurringIncomeTotalForMonthF(mk);
    const totalExpense= settlement + recurExpense;
    const netFlow     = recurIncome - totalExpense; // 収支（プラスが黒字）
    sums.usage+=usage; sums.settlement+=settlement;
    sums.recurExpense+=recurExpense; sums.recurIncome+=recurIncome;
    sums.totalExpense+=totalExpense; sums.netFlow+=netFlow;
    rows.push({mk, m, usage, settlement, recurExpense, recurIncome, totalExpense, netFlow});

  // セルの値をフォーマット（0の場合はグレーのダッシュ）

  function cellSigned(v){
    if(v === 0) return `<td class="num" style="color:var(--line);">—</td>`;

    return `<td class="num" style="color:${color}; font-weight:700;">${v>0?'+':''}${yen(v)}</td>`;

          <th>合計<br>支出</th>
          <th>収支</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r=>`
          <tr class="${r.mk===thisMk?'current-month':''}">
            <td>${r.m}月</td>
            ${cell(r.usage)}
            ${cell(r.settlement, 'var(--coral)')}
            ${cell(r.recurExpense, 'var(--coral)')}
            ${cell(r.recurIncome, 'var(--green)')}
            ${cell(r.totalExpense, 'var(--coral)')}
            ${cellSigned(r.netFlow)}
          </tr>
        `).join('')}
        <tr class="total-row">
          <td>合計</td>
          <td class="num">${yen(sums.usage)}</td>
          <td class="num" style="color:var(--coral);">${yen(sums.settlement)}</td>

          <td class="num" style="color:var(--coral);">${yen(sums.totalExpense)}</td>
          <td class="num" style="color:${sums.netFlow>=0?'var(--green)':'var(--coral)'}; font-weight:700;">${sums.netFlow>0?'+':''}${yen(sums.netFlow)}</td>
        </tr>
      </tbody>

    <div class="helper-text" style="margin-top:10px; margin-bottom:0;">
      合計支出 ＝ クレカ引落 ＋ 定期支出　　収支 ＝ 定期収入 − 合計支出　　クレカ利用は参考値（引落月と異なる）<br>※ 通常の入出金（入出金タブの登録）は含まれません。口座残高への直接の入出金は「入出金差額」を参照してください。

  const el = document.getElementById('cardSettlementTable');

  // フィルタに応じてカードを絞り込む
  const targetCards = summaryTypeFilter==='all' ? DB.cards : DB.cards.filter(c=>cardMatchesType(c,summaryTypeFilter));

  if(targetCards.length === 0){
    el.innerHTML = `<div class="empty-state"><div class="et">${summaryTypeFilter==='all'?'カードが未登録です':'この区分のカードがありません'}</div><div class="es">${summaryTypeFilter==='all'?'設定タブからカードを追加してください':'フィルタを「全体」に切り替えるか、設定タブでカードを追加してください'}</div></div>`;

  // 全カード合計
  const totalUsage   = rows.reduce((s,r)=>s+r.usage, 0);

  if(totalUsage === 0 && totalSettled === 0){

/* =========================================================================
   6-5  口座残高予測（12か月）
   当月末から12か月先まで、月ごとの予測残高を折れ線グラフ＋テーブルで表示する。
   --------
   計算方式（B-03対応後・V2-19）：
     通常入出金（bankEntries）のうち date<=本日 のものは登録の時点で
     account.balance（totalBalance()）へ即時反映済み。date>本日（未来日）の
     ものは appliedToBalance=false のまま保留され、totalBalance() には
     含まれていない。そのため予測は「現在残高」を起点に、定期収入・
     カード引落（引落月ベース）・定期支出・保留中の未来日入出金
     （futureBankNetForMonth）を積み上げる。pendingBankEntries() が
     appliedToBalance:false のみを対象にしているため、反映済み分との
     二重計算は発生しない。
     各月の純キャッシュ変動 = 定期収入 - カード引落(引落月ベース) - 定期支出 + 保留中入出金純額
     予測残高[n月末] = totalBalance() + Σ(月0..n の純変動)
   ② 口座別予測：口座タブで選択した口座の balance を起点に、
     その口座に紐づく定期収支・クレカ引落・保留入出金だけで積み上げる。
   ========================================================================= */
function renderBalanceForecast(){
  const el = document.getElementById('balanceForecast');
  if(!el) return;

  // 口座が1件もない場合のガード
  if(DB.accounts.length === 0){
    el.innerHTML = `<div class="empty-state"><div class="et">口座が登録されていません</div></div>`;
    return;
  }

  // ── 口座タブを構築 ──────────────────────────────────────────────────────
  // forecastAccountFilter が null = 全口座合計、accountId = 口座別
  const tabs = [
    { id: null, label: '全口座合計' },
    ...DB.accounts.map(a => ({ id: a.id, label: a.name })),
  ];
  const tabsHTML = `
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;">
      ${tabs.map(t => {
        const active = forecastAccountFilter === t.id;
        return `<button class="filter-chip ${active?'active':''}"
          style="font-size:12px; padding:6px 12px;"
          onclick="setForecastAccount(${t.id === null ? 'null' : `'${t.id}'`})"
          >${escapeHtml(t.label)}</button>`;
      }).join('')}
    </div>`;

  // ── データ生成 ──────────────────────────────────────────────────────────
  const months = buildForecastMonths(forecastAccountFilter);

  // 現在選択中の口座情報（口座別表示時のラベル表示用）
  const selectedAcct = forecastAccountFilter ? findAccount(forecastAccountFilter) : null;

  const balances = months.map(m=>m.endBalance);
  const minBal = Math.min(...balances);
  const maxBal = Math.max(...balances);
  const range  = maxBal - minBal || 1;

  // ===== 折れ線グラフ (SVG) =====
  const W = 500, H = 120, PL = 8, PR = 8, PT = 12, PB = 20;
  const gW = W - PL - PR;
  const gH = H - PT - PB;
  const stepX = gW / (months.length - 1);

  function px(i){ return PL + i * stepX; }
  function py(val){
    const norm = (val - minBal) / range;
    return PT + gH * (1 - norm);
  }

  // ゼロライン（残高がマイナスを通る場合）
  let zeroLineHTML = '';
  if(minBal < 0 && maxBal > 0){
    const zy = py(0);
    zeroLineHTML = `<line x1="${PL}" y1="${zy.toFixed(1)}" x2="${W-PR}" y2="${zy.toFixed(1)}"
      stroke="var(--coral)" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>`;
  }

  // 折れ線パス
  const pathD = months.map((m,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(m.endBalance).toFixed(1)}`).join(' ');

  // 塗りつぶし領域
  const areaD = pathD
    + ` L${px(months.length-1).toFixed(1)},${(PT+gH).toFixed(1)}`
    + ` L${PL.toFixed(1)},${(PT+gH).toFixed(1)} Z`;

  // 現在月のマーカー
  const curIdx = months.findIndex(m=>m.isCurrent);
  const curMarker = curIdx>=0 ? `<circle cx="${px(curIdx).toFixed(1)}" cy="${py(months[curIdx].endBalance).toFixed(1)}"
    r="4" fill="var(--teal-deep)" stroke="white" stroke-width="1.5"/>` : '';

  // Xラベル（月）
  const xLabels = months.map((m,i)=>{
    if(i % 2 !== 0 && i !== months.length-1) return '';
    return `<text x="${px(i).toFixed(1)}" y="${H-2}" text-anchor="middle"
      font-size="9" fill="var(--ink-soft)">${m.label}</text>`;
  }).join('');

  // 最小・最大ラベル
  const maxIdx = balances.indexOf(maxBal);
  const minIdx = balances.indexOf(minBal);
  const maxLabelX = Math.min(Math.max(px(maxIdx), 28), W-28);
  const minLabelX = Math.min(Math.max(px(minIdx), 28), W-28);
  const maxLabelY = Math.max(py(maxBal) - 5, PT + 8);
  const minLabelY = Math.min(py(minBal) + 13, H - PB - 2);

  const lineColor = minBal < 0 ? 'var(--coral)' : 'var(--teal-deep)';
  const svg = `
  <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:${H}px; display:block; overflow:visible;">
    <defs>
      <linearGradient id="fg-area" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${lineColor}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${zeroLineHTML}
    <path d="${areaD}" fill="url(#fg-area)"/>
    <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${curMarker}
    ${xLabels}
    <text x="${maxLabelX}" y="${maxLabelY}" text-anchor="middle" font-size="8.5" fill="var(--teal-deep)" font-weight="700">${Math.round(maxBal/10000)}万</text>
    ${maxIdx!==minIdx ? `<text x="${minLabelX}" y="${minLabelY}" text-anchor="middle" font-size="8.5" fill="${minBal<0?'var(--coral)':'var(--ink-soft)'}" font-weight="700">${Math.round(minBal/10000)}万</text>` : ''}
  </svg>`;

  // ===== テーブル =====
  const tableRows = months.map(r=>`
    <tr class="${r.isCurrent?'current-month':''}">
      <td style="white-space:nowrap;">${r.yearLabel ? `<span style="font-size:10px;color:var(--ink-soft);display:block;">${r.yearLabel}</span>` : ''}${r.label}</td>
      <td class="num ${r.settlement>0?'':'soft'}">${r.settlement>0 ? yen(r.settlement) : '—'}</td>
      <td class="num ${r.recurExpense>0?'':'soft'}">${r.recurExpense>0 ? yen(r.recurExpense) : '—'}</td>
      <td class="num ${r.recurIncome>0?'':'soft'}">${r.recurIncome>0 ? '+'+yen(r.recurIncome) : '—'}</td>
      <td class="num" style="font-weight:700; color:${r.endBalance<0?'var(--coral)':'var(--ink)'};">${yen(r.endBalance)}</td>
    </tr>
  `).join('');

  // ── 起点残高の説明行 ──
  const startingBalance = forecastAccountFilter === null
    ? totalBalance()
    : Number((findAccount(forecastAccountFilter)||{}).balance || 0);
  const startingLabel = forecastAccountFilter === null
    ? `全口座合計 ${yen(startingBalance)}`
    : `${escapeHtml((selectedAcct||{}).name||'')} ${yen(startingBalance)}`;

  // ── 注記テキスト ──
  let noteText = '※ 予測は現在残高を起点に、カード引落・定期支出・定期収入・未来日の入出金（予定／残高未反映分）の差分を加減算しています。日付が本日以前の通常の入出金（入出金登録）は登録した時点で現在残高に反映済みです。';
  if(forecastAccountFilter !== null){
    noteText += '　口座別表示では、その口座に紐づく定期収支・クレカ引落・入出金のみを反映します（他の口座間の資金移動は含まれません）。';
  }
  if(summaryTypeFilter !== 'all'){
    noteText += `　⚠️ ${summaryTypeFilter==='personal'?'個人':'家計'}フィルタ中：定期収支・クレカはフィルタ後の数値で計算しています。`;
  }

  el.innerHTML = `
    ${tabsHTML}
    <div style="font-size:11px; color:var(--ink-soft); margin-bottom:8px;">
      起点残高：<b class="num" style="color:var(--teal-deep);">${startingLabel}</b>
    </div>
    <div style="margin-bottom:12px;">${svg}</div>
    <div style="overflow-x:auto; margin:0 -4px;">
      <table class="tbl" style="min-width:300px;">
        <thead>
          <tr>
            <th>月末</th>
            <th>引落</th>
            <th>定期支出</th>
            <th>定期収入</th>
            <th>予測残高</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="helper-text" style="margin-top:10px; margin-bottom:0;">
      ${escapeHtml(noteText)}
    </div>
  `;
}

function moveArrayItem(list, id, delta){
  const i = list.findIndex(item=>item.id===id);
  if(i < 0) return false;
  const j = i + delta;
  if(j < 0 || j >= list.length) return false;
  const tmp = list[i];
  list[i] = list[j];
  list[j] = tmp;
  touchRecord(list[i]);
  touchRecord(list[j]);
  saveData();
  return true;
}
function moveAccount(id, delta){ if(moveArrayItem(DB.accounts, id, delta)){ renderSettings(); renderHome(); } }
function moveCard(id, delta){ if(moveArrayItem(DB.cards, id, delta)){ renderSettings(); renderHome(); renderSummary(); } }
function moveMainCat(id, delta){ if(moveArrayItem(categoriesFor(catSettingsType), id, delta)){ renderSettings(); } }
function moveSubCat(catId, subId, delta){
  const cat = categoriesFor(catSettingsType).find(c=>c.id===catId);
  if(cat && moveArrayItem(cat.subs, subId, delta)){ touchRecord(cat); renderSettings(); }
}
function orderButtons(upCode, downCode){
  return `<button class="icon-btn" title="上へ" onclick="${upCode}"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button><button class="icon-btn" title="下へ" onclick="${downCode}"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>`;
}

function renderBackupHealthBanner(){
  const el = document.getElementById('backupHealthBanner');
  if(!el) return;
  const lastExport = getLastExportTime();
  const exportDays = daysSince(lastExport);
  const snapshots = getSnapshots();
  const latestSnap = snapshots[0];
  const snapDays = latestSnap ? daysSince(latestSnap.t) : null;

  let tone = 'ok'; // ok | warn
  let msg;
  if(lastExport===null){
    tone='warn';
    msg = 'まだJSONファイルへの書き出し（端末への実保存）が一度もありません。ブラウザのデータが消えると復元できなくなるため、一度エクスポートしておくと安心です。';
  }else if(exportDays >= 30){
    tone='warn';
    msg = `最後のJSONエクスポートから${exportDays}日経っています。そろそろバックアップをおすすめします。`;
  }else{
    msg = `最後のJSONエクスポート：${exportDays===0?'今日':exportDays+'日前'}（${fmtDateTime(lastExport)}）`;
  }

  const snapInfo = latestSnap
    ? `自動スナップショット：${snapDays===0?'今日':snapDays+'日前'}取得・${snapshots.length}件保持中`
    : '自動スナップショットはまだありません';

  el.innerHTML = `
    <div style="background:${tone==='warn'?'var(--coral-tint)':'var(--green-tint)'}; border-radius:10px; padding:12px 13px; margin-bottom:14px;">
      <div style="display:flex; gap:8px; align-items:flex-start;">
        <span style="font-size:15px; line-height:1.3;">${tone==='warn'?'⚠️':'✅'}</span>
        <div style="font-size:12.5px; line-height:1.55; color:var(--ink);">
          ${escapeHtml(msg)}
          <div style="color:var(--ink-soft); margin-top:4px;">${escapeHtml(snapInfo)}</div>
        </div>
      </div>
    </div>
  `;
}

/* ---------- Restore from automatic backup ---------- */
function openRestorePanel(){
  const snapshots = getSnapshots();
  const log = getChangeLog();

  function body(){
    const snapRows = snapshots.length ? snapshots.map(s=>{
      const c = s.data ? {
        accounts: s.data.accounts?.length||0,
        cards: s.data.cards?.length||0,
        creditEntries: s.data.creditEntries?.length||0,
        bankEntries: s.data.bankEntries?.length||0,
        largeExpenses: s.data.largeExpenses?.length||0,
      } : {};
      return `
      <div class="settings-row">
        <div class="sr-main">
          <div class="sr-name">${fmtDateTime(s.t)}</div>
          <div class="sr-sub">明細 ${ (c.creditEntries||0)+(c.bankEntries||0) }件・定期入出金 ${c.largeExpenses||0}件・口座 ${c.accounts||0}件</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="confirmRestoreSnapshot(${s.t})">この時点に復元</button>
      </div>`;
    }).join('') : `<div class="empty-state"><div class="es">自動スナップショットはまだありません（週1回、自動的に作成されます）</div></div>`;

    const logRows = log.slice(0,12).map(l=>`
      <div class="cat-sub-row" style="padding-left:0;">
        <span>${fmtDateTime(l.t)}</span>
        <span class="num" style="color:var(--ink-soft);">明細${(l.counts.creditEntries||0)+(l.counts.bankEntries||0)}・定期入出金${l.counts.largeExpenses||0}</span>
      </div>
    `).join('');

    return `
      ${modalHeader('自動バックアップから復元')}
      <div class="helper-text" style="margin-top:0;">週1回、自動的に全データのスナップショットを保存しています（直近${MAX_SNAPSHOTS}件）。誤って削除してしまった場合などに、復元できます。</div>
      <div class="field"><label>週次スナップショット</label></div>
      ${snapRows}
      <div class="field" style="margin-top:18px;"><label>最近の変更履歴（参考）</label></div>
      ${logRows || '<div class="helper-text">変更履歴はまだありません</div>'}
      <div class="form-actions">
        <button class="btn btn-ghost btn-block" onclick="closeModal()">閉じる</button>
      </div>
    `;
  }
  openModal(body());
}

function confirmRestoreSnapshot(timestamp){
  askConfirm(
    `${fmtDateTime(timestamp)}の状態に復元します。現在のデータは上書きされます。よろしいですか？`,
    ()=>{
      const ok = restoreSnapshot(timestamp);
      if(ok){
        // B-03対応：復元したスナップショットの中に、現在の日付から見て既に
        // 期日が到来している保留中（未来日）の入出金が含まれている場合に
        // 備え、復元直後にもキャッチアップを実行する。
        runDueBankEntriesCatchUp();
      }
      closeModal();
      if(ok){
        renderAll();
        showToast('復元しました');
      }else{
        showToast('復元に失敗しました');
      }
    },
    { danger:false, confirmLabel:'復元する' }
  );
}

function openAccountForm(editId){
  const editing = editId ? findAccount(editId) : null;

    isMain: editing ? !!editing.isMain : DB.accounts.length===0,

    return `

      <div class="field">
        <label>メイン口座に設定</label>
        <div class="segmented">
          <button type="button" class="${state.isMain?'active':''}" onclick="acctFormSetMain(true)">はい</button>
          <button type="button" class="${!state.isMain?'active':''}" onclick="acctFormSetMain(false)">いいえ</button>
        </div>
      </div>

      </div>
    `;

    const nameEl = document.getElementById('af_name');
    const balEl = document.getElementById('af_balance');
    if(nameEl) nameEl.oninput = ()=>state.name = nameEl.value;

  }

function submitAccountForm(editId){
  const s = window._acctFormState;
  if(!s.name || !s.name.trim()){ showToast('口座名を入力してください'); return; }
  if(s.balance==='' || isNaN(Number(s.balance))){ showToast('残高を入力してください'); return; }

  if(s.isMain){
    DB.accounts.forEach(a=>a.isMain=false);
  }
  if(editId){
    const a = findAccount(editId);
    touchRecord(Object.assign(a, {name:s.name.trim(), balance:Number(s.balance), isMain:s.isMain}));
    showToast('口座を更新しました');
  }else{
    DB.accounts.push(stampNew({id:uid('acc'), name:s.name.trim(), balance:Number(s.balance), isMain:s.isMain, buffer:0}));
    showToast('口座を追加しました');
  }
  // ensure at least one main account
  if(!DB.accounts.some(a=>a.isMain) && DB.accounts.length>0) DB.accounts[0].isMain = true;
  saveData();
  closeModal();
  renderSettings(); renderHome();
}

function deleteAccount(id){
  const usedByLarge = DB.largeExpenses.some(e=>e.accountId===id);
  const usedByCredit = DB.creditEntries.some(e=>e.settlementAccountId===id);
  const usedByBank = DB.bankEntries.some(e=>e.accountId===id);
  const msg = (usedByLarge || usedByCredit || usedByBank)
    ? 'この口座は明細で使用されています。削除すると関連明細の口座表示が「削除済み」になります。削除しますか？'
    : 'この口座を削除しますか？';
  askConfirm(msg, ()=>{
    DB.accounts = DB.accounts.filter(a=>a.id!==id);
    if(!DB.accounts.some(a=>a.isMain) && DB.accounts.length>0) DB.accounts[0].isMain = true;
    saveData();
    closeModal();
    renderSettings(); renderHome();
  });
}

function dayOptionsHTML(selectedVal){
  const opts = [`<option value="0" ${selectedVal===0?'selected':''}>月末</option>`];
  for(let d=1; d<=31; d++){
    opts.push(`<option value="${d}" ${selectedVal===d?'selected':''}>${d}日</option>`);
  }
  return opts.join('');
}

function submitCardForm(editId){
  const s = window._cardFormState;
  if(!s.name || !s.name.trim()){ showToast('カード名を入力してください'); return; }
  if(editId){
    touchRecord(Object.assign(findCard(editId), {name:s.name.trim(), type:s.type, closingDay:s.closingDay, paymentDay:s.paymentDay, hidden:!!s.hidden}));
    showToast('カードを更新しました');
  }else{
    DB.cards.push(stampNew({id:uid('card'), name:s.name.trim(), type:s.type, closingDay:s.closingDay, paymentDay:s.paymentDay, hidden:false}));
    showToast('カードを追加しました');
  }
  saveData();
  closeModal();
  renderSettings(); renderHome();
}

function setCardHidden(id, hidden){
  const c = findCard(id);
  if(!c) return;
  touchRecord(Object.assign(c, {hidden}));
  saveData();
  closeModal();
  renderSettings(); renderHome();
  showToast(hidden ? 'カードを非表示にしました' : 'カードを再表示しました');
}

function deleteCard(id){
  const card = findCard(id);
  if(!card) return;
  const usageCount = DB.creditEntries.filter(e=>e.cardId===id).length;
  if(usageCount > 0){
    openCardDeleteGuardModal(card, usageCount);
    return;
  }
  askConfirm('このカードを削除しますか？', ()=>{
    DB.cards = DB.cards.filter(c=>c.id!==id);
    saveData();
    closeModal();
    renderSettings(); renderHome();
  });
}

function openCardDeleteGuardModal(card, usageCount){
  openModal(`
    ${modalHeader('カードの削除について')}
    <div style="font-size:14px; line-height:1.7; color:var(--ink); margin-bottom:18px;">
      「${escapeHtml(card.name)}」には<strong class="num">${usageCount}件</strong>の明細が登録されています。<br>
      削除すると締め日・引落日の情報が失われ、引落予定一覧やサマリの集計が変わる場合があります。<br><br>
      今後このカードを使わないだけであれば、<strong>「非表示にする」</strong>がおすすめです。明細・集計はそのまま保持され、新規登録の選択肢からのみ外れます。

    <div style="display:flex; flex-direction:column; gap:8px;">
      <button class="btn btn-primary btn-block" onclick="setCardHidden('${card.id}', true)">非表示にする（推奨）</button>

      <button class="btn btn-ghost btn-block" onclick="closeModal()">キャンセル</button>

  `);
}

function submitMainCatForm(catId){
  const s = window._mainCatState;
  if(!s.name || !s.name.trim()){ showToast('カテゴリ名を入力してください'); return; }
  const cats = categoriesFor(catSettingsType);
  if(catId){
    const c = cats.find(x=>x.id===catId);
    const oldName = c.name, newName = s.name.trim();
    c.name = newName; touchRecord(c);
    if(oldName !== newName){
      DB.creditEntries.forEach(e=>{ if(e.type===catSettingsType && e.mainCategory===oldName) e.mainCategory = newName; });
      DB.largeExpenses.forEach(e=>{ if(e.type===catSettingsType && e.mainCategory===oldName) e.mainCategory = newName; });
    }
  }else{
    cats.push(stampNew({id:uid('cat'), name:s.name.trim(), subs:[]}));
  }
  const ok = saveData();
  closeModal();
  renderSettings();
  if(!ok){
    showToast('大カテゴリの更新に失敗しました(保存エラー)');
  } else {
    showToast(catId ? '大カテゴリを更新しました' : '大カテゴリを追加しました');
  }
}

function deleteMainCat(catId){
  askConfirm('この大カテゴリを削除しますか？配下の中カテゴリも削除されます。', ()=>{
    DB.categories[catSettingsType] = categoriesFor(catSettingsType).filter(c=>c.id!==catId);
    saveData();
    pruneMruCategories();
    closeModal();
    renderSettings();
  });
}

function openSubCatForm(catId, subId){
  const cats = categoriesFor(catSettingsType);
  const cat = cats.find(c=>c.id===catId);
  const editing = subId ? cat.subs.find(s=>s.id===subId) : null;
  const state = { name: editing?editing.name:'' };
  function body(){
    return `
      ${modalHeader(editing?'中カテゴリを編集':'中カテゴリを追加')}
      <div class="helper-text" style="margin-top:0;">大カテゴリ「${escapeHtml(cat.name)}」配下</div>
      <div class="field"><label>カテゴリ名<span class="req">*</span></label>
        <input type="text" id="sc_name" placeholder="例：外食" value="${escapeHtml(state.name)}"></div>
      <div class="form-actions">
        ${editing ? `<button class="btn btn-ghost" onclick="deleteSubCat('${catId}','${editing.id}')">削除</button>` : ''}
        <button class="btn btn-primary" onclick="submitSubCatForm('${catId}', ${editing?`'${editing.id}'`:'null'})">${editing?'更新する':'追加する'}</button>
      </div>
    `;
  }
  window._subCatState = state;
  openModal(body());
  setTimeout(()=>{ const el = document.getElementById('sc_name'); if(el) el.oninput = ()=>state.name = el.value; },0);
}

function submitSubCatForm(catId, subId){
  const s = window._subCatState;
  if(!s.name || !s.name.trim()){ showToast('カテゴリ名を入力してください'); return; }
  const cat = categoriesFor(catSettingsType).find(c=>c.id===catId);
  if(subId){
    const sub = cat.subs.find(x=>x.id===subId);
    const oldName = sub.name, newName = s.name.trim();
    sub.name = newName; touchRecord(sub);
    if(oldName !== newName){
      DB.creditEntries.forEach(e=>{ if(e.type===catSettingsType && e.mainCategory===cat.name && e.subCategory===oldName) e.subCategory = newName; });
      DB.largeExpenses.forEach(e=>{ if(e.type===catSettingsType && e.mainCategory===cat.name && e.subCategory===oldName) e.subCategory = newName; });
    }
  }else{
    cat.subs.push(stampNew({id:uid('sub'), name:s.name.trim()})); touchRecord(cat);
  }
  const ok = saveData();
  closeModal();
  renderSettings();
  if(!ok){
    showToast('中カテゴリの更新に失敗しました(保存エラー)');
  } else {
    showToast(subId ? '中カテゴリを更新しました' : '中カテゴリを追加しました');
  }
}

function deleteSubCat(catId, subId){
  askConfirm('この中カテゴリを削除しますか？', ()=>{
    const cat = categoriesFor(catSettingsType).find(c=>c.id===catId);
    cat.subs = cat.subs.filter(s=>s.id!==subId);
    saveData();
    pruneMruCategories();
    closeModal();
    renderSettings();
  });
}

/* ---------- JSON export / import ---------- */
function exportJSON(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = 'finance-data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  markExported();
  showToast('JSONファイルを書き出しました');
  if(currentTab==='settings') renderSettings();
}

function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.accounts)){
        showToast('ファイル形式が正しくありません');
        event.target.value = '';
        return;
      }
      askConfirm('現在のデータを上書きしてインポートします。よろしいですか？', ()=>{
        const previousDB = DB; // E-09対応：保存失敗時のロールバック用に退避
        DB = migrateData(Object.assign(defaultData(), parsed));
        const ok = saveData();
        if(!ok){
          // E-09対応：保存（localStorage.setItem）が失敗した場合、画面上の
          // DBだけが新データに置き換わり、永続化はされていない不整合状態に
          // なってしまう。再読込するとインポート前のデータに戻る一方、
          // 何も保存されていないことに気付かれないままだと「成功した」と
          // 誤認してしまうため、旧DBへロールバックした上で専用の警告を表示する。
          DB = previousDB;
          renderAll();
          showToast('インポートに失敗しました（保存エラー）。データは変更されていません');
          event.target.value = '';
          return;
        }
        // B-03対応：インポートしたデータの中に、現在の日付から見て既に期日が
        // 到来している保留中（未来日）の入出金が含まれている場合に備え、
        // インポート直後にもキャッチアップを実行する。
        runDueBankEntriesCatchUp();
        pruneMruCategories();
        renderAll();
        // C-15対応：migrateData()で対象月未設定のため自動停止された定期入出金が
        // あれば、ユーザーが気付けるようトースト文言に件数を含める。
        const autoDeactivatedCount = DB.largeExpenses.filter(e=>e._autoDeactivatedReason).length;
        showToast(autoDeactivatedCount > 0
          ? `データをインポートしました（対象月未設定の定期入出金${autoDeactivatedCount}件を自動停止しました）`
          : 'データをインポートしました');
      }, { danger:false, confirmLabel:'インポートする' });
      event.target.value = '';
    }catch(err){
      console.error(err);
      showToast('読み込みに失敗しました');
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

/* =========================================================================
   INIT
   ========================================================================= */
// B-03対応：保留中（appliedToBalance=false、未来日のため未反映）の入出金の
// うち、起動時点で日付が本日以前に到達しているものを自動的に口座残高へ
// 反映する（Phase 4：日付到来時の自動キャッチアップ）。
runDueBankEntriesCatchUp();

// On load: ensure a changelog entry exists, and take a snapshot if a week
// has passed since the last one (covers "opened the app but didn't edit
// anything" weeks too, not just edit-triggered saves).
if(getChangeLog().length===0) recordChangeLogEntry();
maybeRunWeeklySnapshot();

installTapActionSupport();
installSwipeActions();
renderAll();

// keep topbar shadow state on scroll
window.addEventListener('scroll', ()=>{
  document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 4);
});

</script>
