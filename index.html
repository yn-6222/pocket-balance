function heroRingSVG(total, spent){
  const pct = total>0 ? Math.max(0, Math.min(1, 1 - spent/total)) : 0;
  const r = 31, c = 2*Math.PI*r;
  const offset = c * (1-pct);
  const pctLabel = Math.round(pct*100);
  const trackColor = 'rgba(255,255,255,0.18)';
  const fillColor = pct < 0.2 ? '#FFB8A8' : '#fff';
  return `
  <div style="position:relative; width:72px; height:72px; flex-shrink:0;">
    <svg width="72" height="72" viewBox="0 0 76 76" style="position:absolute;top:0;left:0;transform:rotate(-90deg);">
      <circle cx="38" cy="38" r="${r}" fill="none" stroke="${trackColor}" stroke-width="6"/>
      <circle cx="38" cy="38" r="${r}" fill="none" stroke="${fillColor}" stroke-width="6"
        stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
      <span style="font-size:14px;font-weight:700;color:#fff;line-height:1;">${pctLabel}%</span>
    </div>
  </div>`;
}

// 明細一覧に表示する「対象月」の選択肢を作る。
// データに登場する月＋現在月をすべて拾い、新しい月から降順で並べる。
function homeAvailableMonths(){
  const set = new Set();
  set.add(monthKey(new Date()));
  DB.creditEntries.forEach(e=>{ if(e.date) set.add(isoToMonthKey(e.date)); });
  DB.bankEntries.forEach(e=>{ if(e.date) set.add(isoToMonthKey(e.date)); });
  return Array.from(set).sort().reverse();
}

function renderHomeMonthSelect(){
  const el = document.getElementById('homeMonthSelect');
  if(!el) return;
  const months = homeAvailableMonths();
  // 選択中の月が選択肢に無い場合（例：データ削除後）も表示できるよう保険で追加
  if(homeMonthFilter!=='all' && !months.includes(homeMonthFilter)) months.unshift(homeMonthFilter);
  el.innerHTML = `<option value="all" ${homeMonthFilter==='all'?'selected':''}>すべての月</option>` +
    months.map(mk=>`<option value="${mk}" ${homeMonthFilter===mk?'selected':''}>${monthLabel(mk)}</option>`).join('');
  el.onchange = ()=>{
    homeMonthFilter = el.value;
    homeDisplayLimit = 50;
    renderHomeEntryList();
  };
}

function combinedHomeEntries(){
  const credit = DB.creditEntries.map(e=>({...e, _kind:'credit'}));
  const bank = DB.bankEntries.map(e=>({...e, _kind:'bank'}));
  let all = [...credit, ...bank];
  if(homeListFilter==='credit') all = credit;
  if(homeListFilter==='bank') all = bank;

  // 表示月で絞り込み（デフォルトは今月。「すべての月」選択時はスキップ）
  if(homeMonthFilter && homeMonthFilter!=='all'){
    all = all.filter(e=>e.date && isoToMonthKey(e.date)===homeMonthFilter);
  }

  // キーワード検索（メモ・カード名・口座名を対象）
  const kw = (homeSearchKeyword||'').trim().toLowerCase();
  if(kw){
    all = all.filter(e=>{
      if(e._kind==='credit'){
        const card = findCard(e.cardId);
        return [e.memo, card?card.name:'']
          .some(v=>String(v||'').toLowerCase().includes(kw));
      }else{
        const acct = findAccount(e.accountId);
        return [e.description, e.memo, acct?acct.name:'']
          .some(v=>String(v||'').toLowerCase().includes(kw));
      }
    });
  }

  all.sort((a,b)=> b.date.localeCompare(a.date) || (b.id > a.id ? 1 : -1));
  return all;
}

/* ---------- Credit entry form ---------- */
function openCreditForm(editId){
  const editing = editId ? DB.creditEntries.find(e=>e.id===editId) : null;
  const type = editing ? editing.type : 'personal';
  const state = {
    date: editing ? editing.date : todayISO(),
    type: type,
    cardId: editing ? editing.cardId : (DB.cards.find(c=>cardMatchesType(c,type) && !c.hidden)||{}).id,
    amount: editing ? editing.amount : '',
    settlementAccountId: editing ? editing.settlementAccountId : (mainAccount()||{}).id,
    memo: editing ? editing.memo : '',
  };

  function body(){
    const cardsOfType = DB.cards.filter(c=>cardMatchesType(c,state.type) && (!c.hidden || c.id===state.cardId));
    return `
      ${modalHeader(editing ? 'カード明細を編集' : 'カード明細を登録')}
      <div class="field">
        <label>利用日<span class="req">*</span></label>
        <input type="date" id="cf_date" value="${state.date}" min="1900-01-01" max="2099-12-31">
      </div>
      <div class="field">
        <label>区分<span class="req">*</span></label>
        <div class="segmented">
          <button type="button" class="${state.type==='personal'?'active':''}" onclick="creditFormSetType('personal')">個人</button>
          <button type="button" class="${state.type==='household'?'active':''}" onclick="creditFormSetType('household')">家計</button>
        </div>
      </div>
      <div class="field">
        <label>カード<span class="req">*</span></label>
        ${cardsOfType.length ? `
        <div class="chip-group">
          ${cardsOfType.map(c=>`<button type="button" class="chip ${state.cardId===c.id?'active':''}" onclick="creditFormSetCard('${c.id}')">${escapeHtml(c.name)}${c.hidden?'（非表示）':''}</button>`).join('')}
        </div>` : `<div class="helper-text">この区分のカードが未登録です。設定タブから追加してください。</div>`}
      </div>
      <div class="field">
        <label>金額<span class="req">*</span></label>
        <input type="number" id="cf_amount" inputmode="numeric" placeholder="0" value="${state.amount}">
      </div>
      <div class="field">
        <label>内容</label>
        <textarea id="cf_memo" placeholder="例：Netflix、ガソリン代（任意）">${escapeHtml(state.memo)}</textarea>
      </div>
      <div class="field">
        <label>引落口座</label>
        <select id="cf_account">
          ${DB.accounts.map(a=>`<option value="${a.id}" ${state.settlementAccountId===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-actions">
        ${editing ? `<button class="btn btn-ghost" onclick="deleteCreditEntry('${editing.id}')">削除</button>` : ''}
        <button class="btn btn-primary" onclick="submitCreditForm(${editing? `'${editing.id}'`:'null'})">${editing?'更新する':'登録する'}</button>
      </div>
    `;
  }

  window._creditFormState = state;
  window.creditFormSetType = (t)=>{
    state.type = t;
    const firstCard = DB.cards.find(c=>cardMatchesType(c,t) && !c.hidden);
    state.cardId = firstCard ? firstCard.id : null;
    openModal(body());
    captureCreditFormInputs();
  };
  window.creditFormSetCard = (id)=>{ state.cardId = id; openModal(body()); captureCreditFormInputs(); };

  function captureCreditFormInputs(){
    const dateEl = document.getElementById('cf_date');
    const amtEl = document.getElementById('cf_amount');
    const acctEl = document.getElementById('cf_account');
    const memoEl = document.getElementById('cf_memo');
    if(dateEl) dateEl.value = state.date, dateEl.oninput = ()=>state.date = dateEl.value;
    if(amtEl) amtEl.value = state.amount, amtEl.oninput = ()=>state.amount = amtEl.value;
    if(acctEl) acctEl.oninput = ()=>state.settlementAccountId = acctEl.value;
    if(memoEl) memoEl.oninput = ()=>state.memo = memoEl.value;
  }

  openModal(body());
  captureCreditFormInputs();
}

function submitCreditForm(editId){
  const s = window._creditFormState;
  if(!s.date){ showToast('利用日を入力してください'); return; }
  if(!s.cardId){ showToast('カードを選択してください'); return; }
  if(!s.amount || Number(s.amount)<=0){ showToast('金額を入力してください'); return; }

  const selectedCard = findCard(s.cardId);
  const cardSnap = { closingDay: selectedCard ? selectedCard.closingDay : null, paymentDay: selectedCard ? selectedCard.paymentDay : null };

  if(editId){
    const entry = DB.creditEntries.find(e=>e.id===editId);
    // 既に引落済み（settled:true）の明細は口座残高へ反映済みのため、
    // 金額・引落口座の変更内容を残高にも同期させる（B-03のbankEntries編集と同様の考え方）。
    const wasSettled = entry.settled === true;
    const prevAmount = Number(entry.amount||0);
    const prevAcctId = entry.settlementAccountId || (mainAccount()||{}).id;
    touchRecord(Object.assign(entry, {
      date:s.date, type:s.type, cardId:s.cardId, amount:Number(s.amount),
      settlementAccountId:s.settlementAccountId, memo:s.memo,
      ...cardSnap
    }));
    if(wasSettled){
      const newAcctId = entry.settlementAccountId || (mainAccount()||{}).id;
      const prevAcct = findAccount(prevAcctId);
      if(prevAcct) prevAcct.balance += prevAmount; // 旧内容の取り消し
      const newAcct = findAccount(newAcctId);
      if(newAcct) newAcct.balance -= Number(entry.amount||0); // 新内容を反映
    }
    showToast('明細を更新しました');
  }else{
    DB.creditEntries.push(stampNew({
      id: uid('ce'), date:s.date, type:s.type, cardId:s.cardId, amount:Number(s.amount),
      settlementAccountId:s.settlementAccountId, memo:s.memo,
      ...cardSnap,
      settled: false,
    }));
    showToast('明細を登録しました');
  }
  saveData();
  closeModal();
  renderHome(); renderSummary();
}

function deleteCreditEntry(id){
  const entry = DB.creditEntries.find(e=>e.id===id);
  const isGenerated = entry && entry.largeExpenseId;
  const srcExp = isGenerated ? DB.largeExpenses.find(e=>e.id===entry.largeExpenseId) : null;
  const msg = isGenerated
    ? `この明細は予定収支「${srcExp ? escapeHtml(srcExp.name) : '（削除済み）'}」から自動生成されました。削除すると翌月以降は引き続き生成されますが、この月の分は再生成されません。削除しますか？`
    : 'この明細を削除しますか？';
  askConfirm(msg, ()=>{
    // settled済み（口座残高へ反映済み）の明細を削除する場合は、残高を元に戻す。
    if(entry && entry.settled === true){
      const acctId = entry.settlementAccountId || (mainAccount()||{}).id;
      const acct = findAccount(acctId);
      if(acct) acct.balance += Number(entry.amount||0);
    }
    DB.creditEntries = DB.creditEntries.filter(e=>e.id!==id);
    saveData();
    closeModal();
    renderHome(); renderSummary();
  });
}

    description: editing ? editing.description : '',

  function body(){
    return `

        <label>登録日<span class="req">*</span></label>

        </select>
      </div>
      <div class="field">
        <label>金額<span class="req">*</span></label>
        <input type="number" id="bf_amount" inputmode="numeric" placeholder="0" value="${state.amount}">
      </div>
      <div class="field">
        <label>内容</label>
        <input type="text" id="bf_description" placeholder="例：給与、現金おろし（任意）" value="${escapeHtml(state.description)}">
      </div>
      <div class="field">
        <label>メモ</label>
        <textarea id="bf_memo">${escapeHtml(state.memo)}</textarea>
      </div>
      <div class="form-actions">
        ${editing ? `<button class="btn btn-ghost" onclick="deleteBankEntry('${editing.id}')">削除</button>` : ''}
        <button class="btn btn-primary" onclick="submitBankForm(${editing? `'${editing.id}'`:'null'})">${editing?'更新する':'登録する'}</button>
      </div>
    `;
  }

  window._bankFormState = state;
  window.bankFormSetType = (t)=>{ state.transactionType = t; openModal(body()); captureBankFormInputs(); };

  function captureBankFormInputs(){
    const dateEl = document.getElementById('bf_date');
    const acctEl = document.getElementById('bf_account');
    const amtEl = document.getElementById('bf_amount');
    const descEl = document.getElementById('bf_description');
    const memoEl = document.getElementById('bf_memo');
    if(dateEl) dateEl.oninput = ()=>state.date = dateEl.value;
    if(acctEl) acctEl.oninput = ()=>state.accountId = acctEl.value;
    if(amtEl) amtEl.oninput = ()=>state.amount = amtEl.value;
    if(descEl) descEl.oninput = ()=>state.description = descEl.value;
    if(memoEl) memoEl.oninput = ()=>state.memo = memoEl.value;
  }

  openModal(body());
  captureBankFormInputs();
}

function submitBankForm(editId){
  const s = window._bankFormState;
  if(!s.date){ showToast('登録日を入力してください'); return; }
  if(!s.accountId){ showToast('口座を選択してください'); return; }
  if(!s.amount || Number(s.amount)<=0){ showToast('金額を入力してください'); return; }

  const prevEntry = editId ? DB.bankEntries.find(e=>e.id===editId) : null;

  // B-03対応：以前に口座残高へ反映済みだった分のみ取り消す。保留中（未来日）
  // のまま編集された場合はそもそも反映されていないため取り消し不要。
  if(prevEntry && prevEntry.appliedToBalance){
    reverseBankEntryEffect(prevEntry);
  }

  // 新しい内容は、日付が本日以前の場合のみ今すぐ口座残高へ反映する。
  // 未来日の場合は反映を保留し（appliedToBalance=false）、12か月予測側でのみ
  // 計上する。保留分は日付が到来した時点でアプリ起動時のキャッチアップにより
  // 自動的に反映される（runDueBankEntriesCatchUp）。
  const willApplyNow = !isFutureDate(s.date);
  if(willApplyNow){
    applyBankEntryEffect({ accountId:s.accountId, transactionType:s.transactionType, amount:Number(s.amount) });
  }

  if(editId){
    touchRecord(Object.assign(prevEntry, {
      date:s.date, accountId:s.accountId, transactionType:s.transactionType,
      amount:Number(s.amount), description:s.description, memo:s.memo,
      appliedToBalance: willApplyNow,
    }));
    showToast('入出金を更新しました');
  }else{
    DB.bankEntries.push(stampNew({
      id: uid('be'), date:s.date, accountId:s.accountId, transactionType:s.transactionType,
      amount:Number(s.amount), description:s.description, memo:s.memo,
      appliedToBalance: willApplyNow,
    }));
    showToast('入出金を登録しました');
  }
  saveData();
  closeModal();
  renderHome(); renderSettings(); renderSummary();
}

function deleteBankEntry(id){
  // B-03対応：保留中（appliedToBalance:false）の明細は削除しても口座残高は
  // 変化しないため、その旨が伝わる文言に出し分ける。
  const target = DB.bankEntries.find(e=>e.id===id);
  const isPending = target && target.appliedToBalance === false;
  const confirmMsg = isPending
    ? 'この予定（未反映）の入出金を削除しますか？口座残高はまだ反映されていないため変化しません。'
    : 'この入出金を削除しますか？口座残高も元に戻ります。';
  askConfirm(confirmMsg, ()=>{
    const entry = DB.bankEntries.find(e=>e.id===id);
    // 反映済み（appliedToBalance:true）の場合のみ口座残高を戻す。
    // 保留中（未来日でまだ反映されていない）の明細はそもそも残高に影響して
    // いないため、削除しても残高は変化しない。
    if(entry && entry.appliedToBalance){
      reverseBankEntryEffect(entry);
    }
    DB.bankEntries = DB.bankEntries.filter(e=>e.id!==id);
    saveData();
    closeModal();
    renderHome(); renderSettings(); renderSummary();
  });
}

let largeListFilter    = 'all';    // all | personal | household

// アーカイブ判定：終了日が今月より前のものをアーカイブとする
// 終了日未設定・スポットで未来月・定期で現在進行中はアクティブ
function isLargeExpenseArchived(exp){
  const thisMk = monthKey(new Date());
  if(exp.frequency === 'spot'){
    return isoToMonthKey(exp.startDate) < thisMk;
  }
  if(!exp.endDate) return false;
  return isoToMonthKey(exp.endDate) < thisMk;
}

function setLargeViewMode(mode){
  largeViewMode = mode;
  renderLargeControls();
  renderLargeList();
}
function setLargeFilter(key){
  largeListFilter = key;
  renderLargeControls();
  renderLargeList();
}

function renderLargeList(){
  const el = document.getElementById('largeList');
  let items = DB.largeExpenses.slice();

  // アクティブ／アーカイブ切替
  items = items.filter(e => largeViewMode==='archived' ? isLargeExpenseArchived(e) : !isLargeExpenseArchived(e));

  // 個人/家計フィルタ
  if(largeListFilter!=='all') items = items.filter(e=>e.type===largeListFilter);

  // 月フィルタ：指定月に発生するもの
  if(largeMonthFilter!=='all'){
    items = items.filter(e=>{
      if(e.frequency==='spot') return isoToMonthKey(e.startDate)===largeMonthFilter;
      if(e.frequency==='custom') return (e.customMonths||[]).includes(Number(largeMonthFilter.split('-')[1]));
      // 定期：startDate〜endDate の範囲内かつ頻度に合致するか
      const startMk = isoToMonthKey(e.startDate);
      const endMk   = e.endDate ? isoToMonthKey(e.endDate) : '9999-99';
      if(largeMonthFilter < startMk || largeMonthFilter > endMk) return false;
      if(e.frequency==='monthly') return true;
      if(e.frequency==='bimonthly'){
        const diff = (Number(largeMonthFilter.replace('-','')) - Number(startMk.replace('-','')));
        return diff % 2 === 0;
      }
      if(e.frequency==='quarterly'){
        const [sy,sm]=startMk.split('-').map(Number);
        const [fy,fm]=largeMonthFilter.split('-').map(Number);
        return ((fy-sy)*12+(fm-sm)) % 3 === 0;
      }
      if(e.frequency==='yearly'){
        return startMk.slice(5)===largeMonthFilter.slice(5);
      }
      return true;
    });
  }

  // キーワード検索
  if(largeSearchQuery.trim()){
    const q = largeSearchQuery.trim().toLowerCase();
    items = items.filter(e=>(e.name||'').toLowerCase().includes(q));
  }

  items.sort((a,b)=> a.name.localeCompare(b.name,'ja'));

  const isArchived = largeViewMode==='archived';
  if(items.length===0){
    const msg = isArchived ? 'アーカイブされた予定収支はありません' : '登録された予定収支がありません';
    const sub = isArchived ? '終了日が過去になった項目が自動的にアーカイブされます' : '給与・家賃・税金・積立など、繰り返し発生する収支を登録しましょう';
    el.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor" fill="none"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
      <div class="et">${msg}</div>
      <div class="es">${sub}</div>
    </div>`;
    return;
  }
  const swipeHint = `<div class="swipe-hint">
    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    左にスワイプして操作
  </div>`;
  el.innerHTML = swipeHint + items.map(e=>{
    const acct = findAccount(e.accountId);
    const isIncome = (e.transactionType||'withdraw')==='deposit';
    const isSpotItem = e.frequency === 'spot';
    const freqDesc = e.frequency==='custom'
      ? `任意月指定(${(e.customMonths||[]).slice().sort((a,b)=>a-b).join(',')}月)`
      : FREQ_LABEL[e.frequency];
    const amtLabel = (e.amountMode==='perMonth') ? '月により異なる' : yen(e.amount);
    const endLabel = (!isSpotItem && e.endDate) ? `〜${fmtDateShort(e.endDate)}` : '';
    const dateLabel = isSpotItem ? '発生' : '開始';

        <div class="segmented">
          <button type="button" class="${state.type==='personal'?'active':''}" onclick="largeFormSetType('personal')">個人</button>
          <button type="button" class="${state.type==='household'?'active':''}" onclick="largeFormSetType('household')">家計</button>
        </div>
      </div>
      <div class="field">
        <label>${state.cardId ? '引落口座' : '口座'}<span class="req">*</span></label>
        <select id="lf_account">

function submitLargeForm(editId){
  const s = window._largeFormState;
  if(!s.name || !s.name.trim()){ showToast('名称を入力してください'); return; }
  if(!s.startDate){ showToast('開始日を入力してください'); return; }
  if(s.endDate && s.endDate < s.startDate){ showToast('終了日は開始日以降にしてください'); return; }
  if(!s.accountId){ showToast('口座を選択してください'); return; }
  if(s.frequency==='custom' && (!s.customMonths || s.customMonths.length===0)){ showToast('対象月を選択してください'); return; }

  let amount = 0;
  let monthlyAmounts = {};
  const usePerMonth = s.frequency==='custom' && s.amountMode==='perMonth';
  if(usePerMonth){
    for(const m of s.customMonths){
      const v = Number(s.monthlyAmounts[m]);
      if(!v || v<=0){ showToast(`${m}月の金額を入力してください`); return; }
      monthlyAmounts[m] = v;
    }
  }else{
    if(!s.amount || Number(s.amount)<=0){ showToast('金額を入力してください'); return; }
    amount = Number(s.amount);
  }

  // 引落日：口座直払い・支出のみ保存（カード払いはカード設定に従うため不要）
  const withdrawalDay = (s.transactionType==='withdraw' && !s.cardId && s.withdrawalDay !== '')
    ? Number(s.withdrawalDay) : null;

  const payload = {
    name:s.name.trim(), transactionType:s.transactionType, amount, startDate:s.startDate, endDate:s.endDate||'',
    frequency:s.frequency, customMonths: s.frequency==='custom' ? s.customMonths.slice() : [],
    amountMode: usePerMonth ? 'perMonth' : 'uniform', monthlyAmounts,
    type:s.type,
    accountId:s.accountId, cardId: s.transactionType==='withdraw' ? (s.cardId||'') : '',
    withdrawalDay, memo:s.memo,
  };

  if(editId){
    const exp = DB.largeExpenses.find(e=>e.id===editId);
    const cardChanged     = (exp.cardId||'') !== (payload.cardId||'');
    const amountChanged   = String(exp.amount||'') !== String(payload.amount||'')
                         || JSON.stringify(exp.monthlyAmounts||{}) !== JSON.stringify(payload.monthlyAmounts||{})
                         || exp.amountMode !== payload.amountMode;
    const scheduleChanged = exp.frequency !== payload.frequency
                         || exp.startDate !== payload.startDate
                         || (exp.endDate||'') !== (payload.endDate||'')
                         || JSON.stringify((exp.customMonths||[]).slice().sort()) !== JSON.stringify((payload.customMonths||[]).slice().sort());
    touchRecord(Object.assign(exp, payload, { active: s.active }));
    // カード・金額・頻度・期間のいずれかが変わった場合、自動生成済みエントリを全削除して再生成
    if(cardChanged || amountChanged || scheduleChanged){
      DB.creditEntries = DB.creditEntries.filter(e=>
        !(e.largeExpenseId===editId)
      );
    }
  }else{
    DB.largeExpenses.push(stampNew(Object.assign({id: uid('le')}, payload, {active:true})));
  }
  const ok = saveData();
  if(ok){ runLargeExpenseCreditCatchUp(); runDueLargeExpenseBankCatchUp(); }
  closeModal();
  renderLargeThisMonth(monthKey(new Date())); renderLargeControls(); renderLargeList(); renderHome(); renderSummary();
  if(!ok){
    showToast('予定収支の更新に失敗しました(保存エラー)');
  } else {
    showToast(editId ? '予定収支を更新しました' : '予定収支を登録しました');
  }
}

function deleteLargeExpense(id){
  const exp = DB.largeExpenses.find(e=>e.id===id);
  const hasGenerated = exp && exp.cardId && DB.creditEntries.some(e=>e.largeExpenseId===id);
  const msg = hasGenerated
    ? 'この予定収支を削除しますか？自動生成されたカード明細もすべて削除されます。'
    : 'この予定収支を削除しますか？';
  askConfirm(msg, ()=>{
    if(hasGenerated){
      DB.creditEntries = DB.creditEntries.filter(e=>e.largeExpenseId!==id);
    }
    DB.largeExpenses = DB.largeExpenses.filter(e=>e.id!==id);
    saveData();
    closeModal();
    renderLargeThisMonth(monthKey(new Date())); renderLargeControls(); renderLargeList(); renderHome(); renderSummary();
  });
}

/* ---- フィルタ付き集計ヘルパー ---- */
// summaryTypeFilter に応じてクレカ明細・定期入出金を絞り込む
function filteredCreditEntries(entries){ return summaryTypeFilter==='all' ? entries : entries.filter(e=>e.type===summaryTypeFilter); }
function filteredLargeExpenses(expenses){ return summaryTypeFilter==='all' ? expenses : expenses.filter(e=>e.type===summaryTypeFilter); }

// フィルタ付き月次クレカ利用合計
function creditTotalForMonthF(mk){ return filteredCreditEntries(creditEntriesForMonth(mk)).reduce((s,e)=>s+Number(e.amount||0),0); }
// フィルタ付き引落合計（予測用・給与サイクルベース）
// カード別引落サマリの引落額列も同じ給与サイクルキーを使う（口座残高予測と統一）
function creditSettlementTotalForMonthF(mk){ return filteredCreditEntries(DB.creditEntries).filter(e=>entryForecastCycleKey(e)===mk).reduce((s,e)=>s+Number(e.amount||0),0); }
// フィルタ付き定期支出合計（カード連携済みは除外：creditEntry側で計上済み）
// 予測用定期支出合計（給与サイクルベース）
// withdrawalDay あり：全発生月から「引落サイクルキー === mk」のものを集める
// withdrawalDay なし：従来通り発生月ベース
function recurringExpenseTotalForMonthF(mk){
  const today = new Date();
  // 検索範囲：mk の前後2ヶ月（サイクルずれ最大1ヶ月を考慮）
  const [y, m] = mk.split('-').map(Number);
  const searchMks = [-1, 0, 1, 2].map(offset => {
    const d = new Date(y, m - 1 + offset, 1);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  });
  return filteredLargeExpenses(DB.largeExpenses)
    .filter(e => (e.transactionType||'withdraw') === 'withdraw' && !e.cardId)
    .reduce((sum, e) => {
      // 各発生月について「引落サイクルキー===mk」なら加算
      for(const smk of searchMks){
        const occurrences = largeExpensesForMonth(smk).filter(x => x.id === e.id);
        if(occurrences.length > 0 && largeExpenseForecastCycleKey(e, smk) === mk){
          sum += amountForExpenseInMonth(e, smk);
        }
      }
      return sum;
    }, 0);
}
// フィルタ付き定期収入合計（発生月ベース・収入は引落日なし）
function recurringIncomeTotalForMonthF(mk){ return filteredLargeExpenses(largeExpensesForMonth(mk)).filter(e=>(e.transactionType||'withdraw')==='deposit').reduce((s,e)=>s+amountForExpenseInMonth(e,mk),0); }

function renderCreditUsageBreakdown(){
  const el = document.getElementById('creditUsageBreakdown');
  if(!el) return;

  const mk = summaryMonth;
  const [, tm] = mk.split('-').map(Number);

  // フィルタ適用済みの当月明細（締め日ベースのサイクル：mkが締め月になる利用分）
  const entries = filteredCreditEntries(DB.creditEntries.filter(e => entryClosingCycleKey(e) === mk));
  const total   = entries.reduce((s,e)=>s+Number(e.amount||0), 0);
  const count   = entries.length;

  if(count === 0){
    el.innerHTML = `<div class="empty-state">
      <div class="et">${tm}月のカード利用がありません</div>
      <div class="es">ホームタブからカード明細を登録すると、ここに内訳が表示されます</div>
    </div>`;
    return;
  }

  // ── カード別集計 ──
  const cardMap = {};
  entries.forEach(e=>{
    if(!cardMap[e.cardId]) cardMap[e.cardId] = { amount:0, count:0 };
    cardMap[e.cardId].amount += Number(e.amount||0);
    cardMap[e.cardId].count  += 1;
  });
  const cardRows = Object.entries(cardMap)
    .map(([cardId, v])=>({ card: findCard(cardId), ...v }))
    .sort((a,b)=>b.amount - a.amount);

  // ── 個人/家計別集計 ──
  let personalAmt = 0, householdAmt = 0;
  let personalCnt = 0, householdCnt = 0;
  entries.forEach(e=>{
    if(e.type==='personal'){ personalAmt += Number(e.amount||0); personalCnt++; }
    else { householdAmt += Number(e.amount||0); householdCnt++; }
  });

  function rowHTML(label, amount, cnt){
    return `
      <div style="display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--line);">
        <span style="font-size:13.5px; font-weight:600;">${escapeHtml(label)}</span>

  }

  const cardBlock = cardRows.map(r=>
    rowHTML(r.card ? r.card.name : '(削除済みカード)', r.amount, r.count)

  const typeBlock = [
    personalAmt > 0 ? rowHTML('個人', personalAmt, personalCnt) : '',

   クレカ利用額・クレカ引落額・定期支出・定期収入・入出金差額・月末予測残高
   の6項目を選択月単位で表示する。
   ========================================================================= */
function renderMonthlySummaryCard(){
  const el = document.getElementById('monthlySummaryCard');
  if(!el) return;
  const mk = summaryMonth;

  // ── 集計 ──────────────────────────────────────────────────
  const creditSettled = creditSettlementTotalForMonthF(mk);  // クレカ引落（給与サイクル）
  const recurExpense  = recurringExpenseTotalForMonthF(mk);  // 予定支出
  const recurIncome   = recurringIncomeTotalForMonthF(mk);   // 予定収入
  let bankIn = 0, bankOut = 0;
  bankEntriesForMonth(mk).forEach(e=>{
    if(e.transactionType==='deposit') bankIn += Number(e.amount||0);
    else bankOut += Number(e.amount||0);
  });

  // 月末予測残高
  const today = new Date();
  const baseMk = monthKey(today);
  let forecast = totalBalance();
  const [sy, sm] = mk.split('-').map(Number);
  const [by, bm] = baseMk.split('-').map(Number);
  const monthDiff = (sy - by) * 12 + (sm - bm);
  if(monthDiff >= 0){
    for(let i = 0; i <= monthDiff; i++){
      const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
      const imk = monthKey(d);
      forecast += recurringIncomeTotalForMonthF(imk)
               - recurringExpenseTotalForMonthF(imk)
               - creditSettlementTotalForMonthF(imk)
               + futureBankNetForMonth(imk);
    }
  } else {
    for(let i = 0; i >= monthDiff; i--){
      const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
      const imk = monthKey(d);
      forecast -= recurringIncomeTotalForMonthF(imk)
               - recurringExpenseTotalForMonthF(imk)
               - creditSettlementTotalForMonthF(imk)
               + futureBankNetForMonth(imk);
    }
  }

  const totalOut = creditSettled + recurExpense + bankOut;
  const totalIn  = recurIncome + bankIn;
  const forecastColor = forecast >= 0 ? 'var(--teal-deep)' : 'var(--coral)';

  // ── 行ヘルパー ─────────────────────────────────────────────
  const row = (label, amount, sign, note='') => {
    const color  = sign === -1 ? 'var(--coral)' : 'var(--green)';
    const prefix = sign === -1 ? '−' : '+';
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:0.5px solid var(--line);">
        <div>
          <span style="font-size:13px; color:${amount===0?'var(--ink-faint)':'var(--ink-primary)'};">${escapeHtml(label)}</span>
          ${note ? `<span style="font-size:11px; color:var(--ink-faint); margin-left:5px;">${escapeHtml(note)}</span>` : ''}
        </div>
        <span style="font-size:15px; font-weight:600; color:${amount===0?'var(--ink-faint)':color};" class="num">${amount===0 ? '—' : prefix+yen(amount)}</span>
      </div>`;
  };

  const sectionHead = (label) =>
    `<div style="font-size:11px; font-weight:700; letter-spacing:0.08em; color:var(--ink-soft); padding:14px 0 2px; text-transform:uppercase;">${label}</div>`;

  const subtotal = (label, amount, sign) => {
    const color  = sign === -1 ? 'var(--coral)' : 'var(--green)';
    const prefix = sign === -1 ? '−' : '+';
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0 12px;">
        <span style="font-size:12px; font-weight:700; color:var(--ink-soft);">${label}</span>
        <span style="font-size:16px; font-weight:700; color:${amount===0?'var(--ink-faint)':color};" class="num">${amount===0?'—':prefix+yen(amount)}</span>
      </div>`;
  };

  el.innerHTML = `
    <div style="padding:0 4px;">

      ${sectionHead('支出')}
      ${row('クレカ引落', creditSettled, -1)}
      ${row('予定支出',   recurExpense,  -1)}
      ${row('出金',       bankOut,       -1)}
      <div style="border-top:1.5px solid var(--line); margin-top:2px;"></div>
      ${subtotal('支出合計', totalOut, -1)}

      ${sectionHead('収入')}
      ${row('予定収入', recurIncome, +1)}
      ${row('入金',     bankIn,      +1)}
      <div style="border-top:1.5px solid var(--line); margin-top:2px;"></div>
      ${subtotal('収入合計', totalIn, +1)}

      <div style="background:var(--paper-sunken); border-radius:12px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; margin-top:6px;">
        <div>
          <div style="font-size:13px; font-weight:700; color:var(--ink-primary); margin-bottom:3px;">月末予測残高</div>
          <div style="font-size:11px; color:var(--ink-faint);">${summaryTypeFilter==='all' ? '定期・引落反映後' : `${summaryTypeFilter==='personal'?'個人':'家計'}分のみ反映`}</div>
        </div>
        <span style="font-size:24px; font-weight:700; color:${forecastColor};" class="num">${yen(forecast)}</span>
      </div>

    </div>
    ${summaryTypeFilter!=='all' ? `
    <div class="helper-text" style="margin-top:10px; margin-bottom:0;">
      ⚠️ <strong>${summaryTypeFilter==='personal'?'個人':'家計'}</strong>フィルタ中：口座残高は全体共通のため、フィルタの影響を受けません。
    </div>` : ''}
  `;
}

  // フィルタに応じてカードを絞り込む
  const targetCards = summaryTypeFilter==='all' ? DB.cards : DB.cards.filter(c=>cardMatchesType(c,summaryTypeFilter));

  if(targetCards.length === 0){
    el.innerHTML = `<div class="empty-state"><div class="et">${summaryTypeFilter==='all'?'カードが未登録です':'この区分のカードがありません'}</div><div class="es">${summaryTypeFilter==='all'?'設定タブからカードを追加してください':'フィルタを「全体」に切り替えるか、設定タブでカードを追加してください'}</div></div>`;

  if(totalUsage === 0 && totalSettled === 0){
    el.innerHTML = `<div class="empty-state"><div class="et">この月のカード利用がありません</div><div class="es">ホームタブからカード明細を登録してください</div></div>`;

  el.innerHTML = `

          <th>引落額</th>

          <td class="num">${yen(totalUsage)}</td>
          <td class="num" style="color:var(--coral);">${yen(totalSettled)}</td>

/* =========================================================================
   6-5  口座残高予測（12か月）
   当月末から12か月先まで、月ごとの予測残高を折れ線グラフ＋テーブルで表示する。
   --------
   計算方式（B-03対応後・V2-19）：
     通常入出金（bankEntries）のうち date<=本日 のものは登録の時点で
     account.balance（totalBalance()）へ即時反映済み。date>本日（未来日）の
     ものは appliedToBalance=false のまま保留され、totalBalance() には
     含まれていない。そのため予測は「現在残高」を起点に、定期収入・
     カード引落（引落月ベース）・定期支出・保留中の未来日入出金
     （futureBankNetForMonth）を積み上げる。pendingBankEntries() が
     appliedToBalance:false のみを対象にしているため、反映済み分との
     二重計算は発生しない。
     各月の純キャッシュ変動 = 定期収入 - カード引落(引落月ベース) - 定期支出 + 保留中入出金純額
     予測残高[n月末] = totalBalance() + Σ(月0..n の純変動)
   ② 口座別予測：口座タブで選択した口座の balance を起点に、
     その口座に紐づく定期収支・クレカ引落・保留入出金だけで積み上げる。
   ========================================================================= */
function renderBalanceForecast(){
  const el = document.getElementById('balanceForecast');
  if(!el) return;

  // 口座が1件もない場合のガード
  if(DB.accounts.length === 0){
    el.innerHTML = `<div class="empty-state"><div class="et">口座が登録されていません</div></div>`;
    return;
  }

  // ── 口座タブを構築 ──────────────────────────────────────────────────────
  // forecastAccountFilter が null = 全口座合計、accountId = 口座別
  const tabs = [
    { id: null, label: '全口座合計' },
    ...DB.accounts.map(a => ({ id: a.id, label: a.name })),
  ];
  const tabsHTML = `
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;">
      ${tabs.map(t => {
        const active = forecastAccountFilter === t.id;
        return `<button class="filter-chip ${active?'active':''}"
          style="font-size:12px; padding:6px 12px;"
          onclick="setForecastAccount(${t.id === null ? 'null' : `'${t.id}'`})"
          >${escapeHtml(t.label)}</button>`;
      }).join('')}
    </div>`;

  // ── データ生成 ──────────────────────────────────────────────────────────
  const months = buildForecastMonths(forecastAccountFilter);

  // 現在選択中の口座情報（口座別表示時のラベル表示用）
  const selectedAcct = forecastAccountFilter ? findAccount(forecastAccountFilter) : null;

  const balances = months.map(m=>m.endBalance);
  const minBal = Math.min(...balances);
  const maxBal = Math.max(...balances);
  const range  = maxBal - minBal || 1;

  // ===== 折れ線グラフ (SVG) =====
  const W = 500, H = 120, PL = 8, PR = 8, PT = 12, PB = 20;
  const gW = W - PL - PR;
  const gH = H - PT - PB;
  const stepX = gW / (months.length - 1);

  function px(i){ return PL + i * stepX; }
  function py(val){
    const norm = (val - minBal) / range;
    return PT + gH * (1 - norm);
  }

  // ゼロライン（残高がマイナスを通る場合）
  let zeroLineHTML = '';
  if(minBal < 0 && maxBal > 0){
    const zy = py(0);
    zeroLineHTML = `<line x1="${PL}" y1="${zy.toFixed(1)}" x2="${W-PR}" y2="${zy.toFixed(1)}"
      stroke="var(--coral)" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>`;
  }

  // 折れ線パス
  const pathD = months.map((m,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(m.endBalance).toFixed(1)}`).join(' ');

  // 塗りつぶし領域
  const areaD = pathD
    + ` L${px(months.length-1).toFixed(1)},${(PT+gH).toFixed(1)}`
    + ` L${PL.toFixed(1)},${(PT+gH).toFixed(1)} Z`;

  // 現在月のマーカー
  const curIdx = months.findIndex(m=>m.isCurrent);
  const curMarker = curIdx>=0 ? `<circle cx="${px(curIdx).toFixed(1)}" cy="${py(months[curIdx].endBalance).toFixed(1)}"
    r="4" fill="var(--teal-deep)" stroke="white" stroke-width="1.5"/>` : '';

  // Xラベル（月）
  const xLabels = months.map((m,i)=>{
    if(i % 2 !== 0 && i !== months.length-1) return '';
    return `<text x="${px(i).toFixed(1)}" y="${H-2}" text-anchor="middle"
      font-size="9" fill="var(--ink-soft)">${m.label}</text>`;
  }).join('');

  // 最小・最大ラベル
  const maxIdx = balances.indexOf(maxBal);
  const minIdx = balances.indexOf(minBal);
  const maxLabelX = Math.min(Math.max(px(maxIdx), 28), W-28);
  const minLabelX = Math.min(Math.max(px(minIdx), 28), W-28);
  const maxLabelY = Math.max(py(maxBal) - 5, PT + 8);
  const minLabelY = Math.min(py(minBal) + 13, H - PB - 2);

  const lineColor = minBal < 0 ? 'var(--coral)' : 'var(--teal-deep)';
  const svg = `
  <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:${H}px; display:block; overflow:visible;">
    <defs>
      <linearGradient id="fg-area" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${lineColor}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${zeroLineHTML}
    <path d="${areaD}" fill="url(#fg-area)"/>
    <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${curMarker}
    ${xLabels}
    <text x="${maxLabelX}" y="${maxLabelY}" text-anchor="middle" font-size="8.5" fill="var(--teal-deep)" font-weight="700">${Math.round(maxBal/10000)}万</text>
    ${maxIdx!==minIdx ? `<text x="${minLabelX}" y="${minLabelY}" text-anchor="middle" font-size="8.5" fill="${minBal<0?'var(--coral)':'var(--ink-soft)'}" font-weight="700">${Math.round(minBal/10000)}万</text>` : ''}
  </svg>`;

  // ===== テーブル =====
  const tableRows = months.map(r=>`
    <tr class="${r.isCurrent?'current-month':''}">
      <td style="white-space:nowrap;">${r.yearLabel ? `<span style="font-size:10px;color:var(--ink-soft);display:block;">${r.yearLabel}</span>` : ''}${r.label}</td>
      <td class="num ${r.settlement>0?'':'soft'}">${r.settlement>0 ? yen(r.settlement) : '—'}</td>
      <td class="num ${r.recurExpense>0?'':'soft'}">${r.recurExpense>0 ? yen(r.recurExpense) : '—'}</td>
      <td class="num ${r.recurIncome>0?'':'soft'}">${r.recurIncome>0 ? '+'+yen(r.recurIncome) : '—'}</td>
      <td class="num" style="font-weight:700; color:${r.endBalance<0?'var(--coral)':'var(--ink)'};">${yen(r.endBalance)}</td>
    </tr>
  `).join('');

  // ── 起点残高の説明行 ──
  const startingBalance = forecastAccountFilter === null
    ? totalBalance()
    : Number((findAccount(forecastAccountFilter)||{}).balance || 0);
  const startingLabel = forecastAccountFilter === null
    ? `全口座合計 ${yen(startingBalance)}`
    : `${escapeHtml((selectedAcct||{}).name||'')} ${yen(startingBalance)}`;

  // ── 注記テキスト ──
  let noteText = '※ 予測は現在残高を起点に、カード引落（支払日が属する給与サイクル月＝毎月25日起算に計上）・定期支出・定期収入・未来日の入出金（予定／残高未反映分）の差分を加減算しています。実際の口座引落日はサマリの「引落予定一覧」を参照してください。';
  if(forecastAccountFilter !== null){
    noteText += '　口座別表示では、その口座に紐づく定期収支・クレカ引落・入出金のみを反映します（他の口座間の資金移動は含まれません）。';
  }
  if(summaryTypeFilter !== 'all'){
    noteText += `　⚠️ ${summaryTypeFilter==='personal'?'個人':'家計'}フィルタ中：定期収支・クレカはフィルタ後の数値で計算しています。`;
  }

  el.innerHTML = `
    ${tabsHTML}
    <div style="font-size:11px; color:var(--ink-soft); margin-bottom:8px;">
      起点残高：<b class="num" style="color:var(--teal-deep);">${startingLabel}</b>
    </div>
    <div style="margin-bottom:12px;">${svg}</div>
    <div style="overflow-x:auto; margin:0 -4px;">
      <table class="tbl" style="min-width:300px;">
        <thead>
          <tr>
            <th>月末</th>
            <th>引落<br><span style="font-size:9px;font-weight:400;">給与月</span></th>
            <th>予定支出</th>
            <th>予定収入</th>
            <th>予測残高</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="helper-text" style="margin-top:10px; margin-bottom:0;">
      ${escapeHtml(noteText)}
    </div>
  `;
}

function moveArrayItem(list, id, delta){
  const i = list.findIndex(item=>item.id===id);
  if(i < 0) return false;
  const j = i + delta;
  if(j < 0 || j >= list.length) return false;
  const tmp = list[i];
  list[i] = list[j];
  list[j] = tmp;
  touchRecord(list[i]);
  touchRecord(list[j]);
  saveData();
  return true;
}
function moveAccount(id, delta){ if(moveArrayItem(DB.accounts, id, delta)){ renderSettings(); renderHome(); } }
function moveCard(id, delta){ if(moveArrayItem(DB.cards, id, delta)){ renderSettings(); renderHome(); renderSummary(); } }
function orderButtons(upCode, downCode){
  return `<button class="icon-btn" title="上へ" onclick="${upCode}"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button><button class="icon-btn" title="下へ" onclick="${downCode}"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>`;
}

function renderBackupHealthBanner(){
  const el = document.getElementById('backupHealthBanner');
  if(!el) return;
  const lastExport = getLastExportTime();
  const exportDays = daysSince(lastExport);
  const snapshots = getSnapshots();
  const latestSnap = snapshots[0];
  const snapDays = latestSnap ? daysSince(latestSnap.t) : null;

  let tone = 'ok'; // ok | warn
  let msg;
  if(lastExport===null){
    tone='warn';
    msg = 'まだJSONファイルへの書き出し（端末への実保存）が一度もありません。ブラウザのデータが消えると復元できなくなるため、一度エクスポートしておくと安心です。';
  }else if(exportDays >= 30){
    tone='warn';
    msg = `最後のJSONエクスポートから${exportDays}日経っています。そろそろバックアップをおすすめします。`;
  }else{
    msg = `最後のJSONエクスポート：${exportDays===0?'今日':exportDays+'日前'}（${fmtDateTime(lastExport)}）`;
  }

  const snapInfo = latestSnap
    ? `自動スナップショット：${snapDays===0?'今日':snapDays+'日前'}取得・${snapshots.length}件保持中`
    : '自動スナップショットはまだありません';

  el.innerHTML = `
    <div style="background:${tone==='warn'?'var(--coral-tint)':'var(--green-tint)'}; border-radius:10px; padding:12px 13px; margin-bottom:14px;">
      <div style="display:flex; gap:8px; align-items:flex-start;">
        <span style="font-size:15px; line-height:1.3;">${tone==='warn'?'⚠️':'✅'}</span>
        <div style="font-size:12.5px; line-height:1.55; color:var(--ink);">
          ${escapeHtml(msg)}
          <div style="color:var(--ink-soft); margin-top:4px;">${escapeHtml(snapInfo)}</div>
        </div>
      </div>
    </div>
  `;
}

/* ---------- Restore from automatic backup ---------- */
function openRestorePanel(){
  const snapshots = getSnapshots();
  const log = getChangeLog();

  function body(){
    const snapRows = snapshots.length ? snapshots.map(s=>{
      const c = s.data ? {
        accounts: s.data.accounts?.length||0,
        cards: s.data.cards?.length||0,
        creditEntries: s.data.creditEntries?.length||0,
        bankEntries: s.data.bankEntries?.length||0,
        largeExpenses: s.data.largeExpenses?.length||0,
      } : {};
      return `
      <div class="settings-row">
        <div class="sr-main">
          <div class="sr-name">${fmtDateTime(s.t)}</div>
          <div class="sr-sub">明細 ${ (c.creditEntries||0)+(c.bankEntries||0) }件・予定収支 ${c.largeExpenses||0}件・口座 ${c.accounts||0}件</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="confirmRestoreSnapshot(${s.t})">この時点に復元</button>
      </div>`;
    }).join('') : `<div class="empty-state"><div class="es">自動スナップショットはまだありません（週1回、自動的に作成されます）</div></div>`;

    const logRows = log.slice(0,12).map(l=>`
      <div class="cat-sub-row" style="padding-left:0;">
        <span>${fmtDateTime(l.t)}</span>
        <span class="num" style="color:var(--ink-soft);">明細${(l.counts.creditEntries||0)+(l.counts.bankEntries||0)}・予定収支${l.counts.largeExpenses||0}</span>
      </div>
    `).join('');

    return `
      ${modalHeader('自動バックアップから復元')}
      <div class="helper-text" style="margin-top:0;">週1回、自動的に全データのスナップショットを保存しています（直近${MAX_SNAPSHOTS}件）。誤って削除してしまった場合などに、復元できます。</div>
      <div class="field"><label>週次スナップショット</label></div>
      ${snapRows}
      <div class="field" style="margin-top:18px;"><label>最近の変更履歴（参考）</label></div>
      ${logRows || '<div class="helper-text">変更履歴はまだありません</div>'}
      <div class="form-actions">
        <button class="btn btn-ghost btn-block" onclick="closeModal()">閉じる</button>
      </div>
    `;
  }
  openModal(body());
}

function confirmRestoreSnapshot(timestamp){
  askConfirm(
    `${fmtDateTime(timestamp)}の状態に復元します。現在のデータは上書きされます。よろしいですか？`,
    ()=>{
      const ok = restoreSnapshot(timestamp);
      if(ok){
        // B-03対応：復元したスナップショットの中に、現在の日付から見て既に
        // 期日が到来している保留中（未来日）の入出金が含まれている場合に
        // 備え、復元直後にもキャッチアップを実行する。
        runDueBankEntriesCatchUp();
        runLargeExpenseCreditCatchUp();
        runDueLargeExpenseBankCatchUp();
        runDueCreditSettlementsCatchUp();
      }
      closeModal();
      if(ok){
        renderAll();
        showToast('復元しました');
      }else{
        showToast('復元に失敗しました');
      }
    },
    { danger:false, confirmLabel:'復元する' }
  );
}

function openAccountForm(editId){
  const editing = editId ? findAccount(editId) : null;
  const state = {
    name: editing ? editing.name : '',
    balance: editing ? editing.balance : '',
    isMain: editing ? !!editing.isMain : DB.accounts.length===0,
  };
  function body(){
    return `
      ${modalHeader(editing?'口座を編集':'口座を追加')}
      <div class="field"><label>口座名<span class="req">*</span></label>
        <input type="text" id="af_name" placeholder="例：サブ口座" value="${escapeHtml(state.name)}"></div>
      <div class="field"><label>残高<span class="req">*</span></label>
        <input type="number" id="af_balance" inputmode="numeric" placeholder="0" value="${state.balance}"></div>
      <div class="field">
        <label>メイン口座に設定</label>
        <div class="segmented">
          <button type="button" class="${state.isMain?'active':''}" onclick="acctFormSetMain(true)">はい</button>
          <button type="button" class="${!state.isMain?'active':''}" onclick="acctFormSetMain(false)">いいえ</button>
        </div>
      </div>
      <div class="form-actions">
        ${editing ? `<button class="btn btn-ghost" onclick="deleteAccount('${editing.id}')">削除</button>` : ''}
        <button class="btn btn-primary" onclick="submitAccountForm(${editing?`'${editing.id}'`:'null'})">${editing?'更新する':'追加する'}</button>
      </div>
    `;
  }
  window._acctFormState = state;
  window.acctFormSetMain = (v)=>{ state.isMain=v; openModal(body()); captureInputs(); };
  function captureInputs(){
    const nameEl = document.getElementById('af_name');
    const balEl = document.getElementById('af_balance');
    if(nameEl) nameEl.oninput = ()=>state.name = nameEl.value;
    if(balEl) balEl.oninput = ()=>state.balance = balEl.value;
  }
  openModal(body());
  captureInputs();
}

function submitAccountForm(editId){
  const s = window._acctFormState;
  if(!s.name || !s.name.trim()){ showToast('口座名を入力してください'); return; }
  if(s.balance==='' || isNaN(Number(s.balance))){ showToast('残高を入力してください'); return; }

  if(s.isMain){
    DB.accounts.forEach(a=>a.isMain=false);
  }
  if(editId){
    const a = findAccount(editId);
    touchRecord(Object.assign(a, {name:s.name.trim(), balance:Number(s.balance), isMain:s.isMain}));
    showToast('口座を更新しました');
  }else{
    DB.accounts.push(stampNew({id:uid('acc'), name:s.name.trim(), balance:Number(s.balance), isMain:s.isMain, buffer:0}));
    showToast('口座を追加しました');
  }
  // ensure at least one main account
  if(!DB.accounts.some(a=>a.isMain) && DB.accounts.length>0) DB.accounts[0].isMain = true;
  saveData();
  closeModal();
  renderSettings(); renderHome();
}

function deleteAccount(id){
  const usedByLarge = DB.largeExpenses.some(e=>e.accountId===id);
  const usedByCredit = DB.creditEntries.some(e=>e.settlementAccountId===id);
  const usedByBank = DB.bankEntries.some(e=>e.accountId===id);
  const msg = (usedByLarge || usedByCredit || usedByBank)
    ? 'この口座は明細で使用されています。削除すると関連明細の口座表示が「削除済み」になります。削除しますか？'
    : 'この口座を削除しますか？';
  askConfirm(msg, ()=>{
    DB.accounts = DB.accounts.filter(a=>a.id!==id);
    if(!DB.accounts.some(a=>a.isMain) && DB.accounts.length>0) DB.accounts[0].isMain = true;
    saveData();
    closeModal();
    renderSettings(); renderHome();
  });
}

        <select id="cdf_paymentDay">${dayOptionsHTML(state.paymentDay)}</select>
      </div>
      <div class="helper-text" style="margin-top:-6px;">引落は締め日の翌月になります（例：月末締め・27日払いの場合、6/10利用→7/27引落）</div>
      ${editing ? `
      <div class="field">
        <label>表示状態</label>
        <div class="segmented">
          <button type="button" class="${!state.hidden?'active':''}" onclick="cardFormSetHidden(false)">表示する</button>
          <button type="button" class="${state.hidden?'active':''}" onclick="cardFormSetHidden(true)">非表示にする</button>
        </div>
        <div class="helper-text">非表示にすると新規明細登録のカード選択肢から外れます（過去の明細・集計はそのまま残ります）。</div>
      </div>` : ''}
      <div class="form-actions">
        ${editing ? `<button class="btn btn-ghost" onclick="deleteCard('${editing.id}')">削除</button>` : ''}
        <button class="btn btn-primary" onclick="submitCardForm(${editing?`'${editing.id}'`:'null'})">${editing?'更新する':'追加する'}</button>
      </div>
    `;
  }
  window._cardFormState = state;
  window.cardFormToggleType = (key)=>{
    const other = key==='personal' ? 'household' : 'personal';
    if(state[key] && !state[other]) return; // 最後の1つはOFFにできない（最低どちらか一方は必須）
    state[key] = !state[key];
    openModal(body()); captureInputs();
  };
  window.cardFormSetHidden = (v)=>{ state.hidden=v; openModal(body()); captureInputs(); };
  function captureInputs(){
    const nameEl = document.getElementById('cdf_name');
    const closingEl = document.getElementById('cdf_closingDay');
    const paymentEl = document.getElementById('cdf_paymentDay');
    if(nameEl) nameEl.oninput = ()=>state.name = nameEl.value;
    if(closingEl) closingEl.oninput = ()=>state.closingDay = Number(closingEl.value);
    if(paymentEl) paymentEl.oninput = ()=>state.paymentDay = Number(paymentEl.value);
  }
  openModal(body());
  captureInputs();
}

function submitCardForm(editId){
  const s = window._cardFormState;
  if(!s.name || !s.name.trim()){ showToast('カード名を入力してください'); return; }
  const type = (s.personal && s.household) ? 'both' : (s.personal ? 'personal' : 'household');
  if(editId){
    touchRecord(Object.assign(findCard(editId), {name:s.name.trim(), type, closingDay:s.closingDay, paymentDay:s.paymentDay, hidden:!!s.hidden}));
    showToast('カードを更新しました');
  }else{
    DB.cards.push(stampNew({id:uid('card'), name:s.name.trim(), type, closingDay:s.closingDay, paymentDay:s.paymentDay, hidden:false}));
    showToast('カードを追加しました');
  }
  saveData();
  closeModal();
  renderSettings(); renderHome();
}

function setCardHidden(id, hidden){
  const c = findCard(id);
  if(!c) return;
  touchRecord(Object.assign(c, {hidden}));
  saveData();
  closeModal();
  renderSettings(); renderHome();
  showToast(hidden ? 'カードを非表示にしました' : 'カードを再表示しました');
}

function deleteCard(id){
  const card = findCard(id);
  if(!card) return;
  const usageCount = DB.creditEntries.filter(e=>e.cardId===id).length;
  if(usageCount > 0){
    openCardDeleteGuardModal(card, usageCount);
    return;
  }
  askConfirm('このカードを削除しますか？', ()=>{
    DB.cards = DB.cards.filter(c=>c.id!==id);
    saveData();
    closeModal();
    renderSettings(); renderHome();
  });
}

function openCardDeleteGuardModal(card, usageCount){
  openModal(`
    ${modalHeader('カードの削除について')}
    <div style="font-size:14px; line-height:1.7; color:var(--ink); margin-bottom:18px;">
      「${escapeHtml(card.name)}」には<strong class="num">${usageCount}件</strong>の明細が登録されています。<br>
      削除すると締め日・引落日の情報が失われ、引落予定一覧やサマリの集計が変わる場合があります。<br><br>
      今後このカードを使わないだけであれば、<strong>「非表示にする」</strong>がおすすめです。明細・集計はそのまま保持され、新規登録の選択肢からのみ外れます。
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <button class="btn btn-primary btn-block" onclick="setCardHidden('${card.id}', true)">非表示にする（推奨）</button>
      <button class="btn btn-coral btn-block" onclick="confirmHardDeleteCard('${card.id}')">それでも削除する</button>
      <button class="btn btn-ghost btn-block" onclick="closeModal()">キャンセル</button>
    </div>
  `);
}

function confirmHardDeleteCard(id){
  askConfirm('本当に削除しますか？関連する明細は「(削除済みカード)」表示になり、締め日・引落日の情報が失われます。', ()=>{
    DB.cards = DB.cards.filter(c=>c.id!==id);
    saveData();
    closeModal();
    renderSettings(); renderHome();
  }, { danger:true, confirmLabel:'削除する' });
}


/* ---------- JSON export / import ---------- */
function exportJSON(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = 'finance-data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  markExported();
  showToast('JSONファイルを書き出しました');
  if(currentTab==='settings') renderSettings();
}

function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.accounts)){
        showToast('ファイル形式が正しくありません');
        event.target.value = '';
        return;
      }
      askConfirm('現在のデータを上書きしてインポートします。よろしいですか？', ()=>{
        const previousDB = DB; // E-09対応：保存失敗時のロールバック用に退避
        DB = migrateData(Object.assign(defaultData(), parsed));
        const ok = saveData();
        if(!ok){
          // E-09対応：保存（localStorage.setItem）が失敗した場合、画面上の
          // DBだけが新データに置き換わり、永続化はされていない不整合状態に
          // なってしまう。再読込するとインポート前のデータに戻る一方、
          // 何も保存されていないことに気付かれないままだと「成功した」と
          // 誤認してしまうため、旧DBへロールバックした上で専用の警告を表示する。
          DB = previousDB;
          renderAll();
          showToast('インポートに失敗しました（保存エラー）。データは変更されていません');
          event.target.value = '';
          return;
        }
        // B-03対応：インポートしたデータの中に、現在の日付から見て既に期日が
        // 到来している保留中（未来日）の入出金が含まれている場合に備え、
        // インポート直後にもキャッチアップを実行する。
        runDueBankEntriesCatchUp();
        runLargeExpenseCreditCatchUp();
        runDueLargeExpenseBankCatchUp();
        const settledBefore = DB.creditEntries.filter(e=>e.settled===true).length;
        runDueCreditSettlementsCatchUp();
        const newlySettled = DB.creditEntries.filter(e=>e.settled===true).length - settledBefore;
        renderAll();
        // C-15対応：migrateData()で対象月未設定のため自動停止された定期入出金が
        // あれば、ユーザーが気付けるようトースト文言に件数を含める。
        const autoDeactivatedCount = DB.largeExpenses.filter(e=>e._autoDeactivatedReason).length;
        const parts = ['データをインポートしました'];
        if(newlySettled > 0) parts.push(`引落日超過のカード明細${newlySettled}件を残高へ反映しました`);
        if(autoDeactivatedCount > 0) parts.push(`対象月未設定の予定収支${autoDeactivatedCount}件を自動停止しました`);
        showToast(parts.length > 1 ? `${parts[0]}（${parts.slice(1).join('／')}）` : parts[0]);
      }, { danger:false, confirmLabel:'インポートする' });
      event.target.value = '';
    }catch(err){
      console.error(err);
      showToast('読み込みに失敗しました');
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

/* =========================================================================
   INIT
   ========================================================================= */
// B-03対応：保留中（appliedToBalance=false、未来日のため未反映）の入出金の
// うち、起動時点で日付が本日以前に到達しているものを自動的に口座残高へ
// 反映する（Phase 4：日付到来時の自動キャッチアップ）。
runDueBankEntriesCatchUp();
// カード連携定期入出金の自動creditEntry生成（今月までの未生成分を補完）
runLargeExpenseCreditCatchUp();
// 口座直接引落の定期入出金：発生日到来分を自動bankEntry化して残高へ反映（本不具合対応）
runDueLargeExpenseBankCatchUp();
// 引落日が到来したカード明細を口座残高へ自動反映（本不具合対応）
runDueCreditSettlementsCatchUp();

// On load: ensure a changelog entry exists, and take a snapshot if a week
// has passed since the last one (covers "opened the app but didn't edit
// anything" weeks too, not just edit-triggered saves).
if(getChangeLog().length===0) recordChangeLogEntry();
maybeRunWeeklySnapshot();

installTapActionSupport();
installSwipeActions();
renderAll();

// keep topbar shadow state on scroll
window.addEventListener('scroll', ()=>{
  document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 4);
});

</script>
